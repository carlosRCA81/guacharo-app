<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRCA PRO V2 - GÉMINIS EDITION</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main-app">
        <header>
            <h1>CRCA PRO <span style="color: #22c55e;">V2</span> <small style="font-size: 0.5rem; color: #fbbf24;">GÉMINIS</small></h1>
            <div id="live-clock">00:00:00</div>
            <div class="tab-container">
                <button class="tab-btn active" onclick="openTab(event, 'registro')">REGISTRO</button>
                <button class="tab-btn" onclick="openTab(event, 'sectores-tab')">MAPA</button>
                <button class="tab-btn" onclick="openTab(event, 'tripletas-tab')">TRIPLETAS</button>
                <button class="tab-btn" onclick="openTab(event, 'historial')">HISTORIAL</button>
            </div>
        </header>

        <section id="registro" class="tab-content active">
            <div class="panel-sniper" id="panel-proxima-jugada">
                <span class="sniper-badge">🎯 SNIPER INTELIGENTE</span>
                <div class="sniper-nums" id="numeros-sugeridos-directos">ESPERANDO DATOS...</div>
                <div id="aviso-fuera" class="aviso-status">📡 RASTREANDO MOVIMIENTO...</div>
            </div>

            <div class="panel-diario" id="panel-diario-sorteos"></div>

            <div class="entrada-rapida">
                <input type="text" id="num-rapido" maxlength="2" placeholder="NRO">
                <button onclick="registrarPorNumero()">ANOTAR</button>
            </div>
            
            <div class="grid-animales" id="grid-container"></div>
            <input type="date" id="fecha-analisis" class="fecha-input">
        </section>

        <section id="sectores-tab" class="tab-content" style="display:none;">
            <div class="info-label">ESTADO DE SENSORES POR SECTOR</div>
            <div id="mapa-ruleta" class="mapa-container"></div>
        </section>

        <section id="tripletas-tab" class="tab-content" style="display:none;">
            <h2 style="text-align:center; color: #fbbf24; font-size: 1rem;">🔥 ESTUDIO DE TRIPLETAS</h2>
            <div id="seccion-tripletas" class="tripleta-list"></div>
        </section>

        <section id="historial" class="tab-content" style="display:none;">
            <div class="historial-header">
                <input type="date" id="fecha-busqueda-historial" class="fecha-input">
            </div>
            <div class="tabla-contenedor">
                <table id="tabla-pro">
                    <thead>
                        <tr>
                            <th>HORA</th>
                            <th>NRO</th>
                            <th>ANIMAL</th>
                            <th>SEC</th>
                            <th>TIPO</th>
                        </tr>
                    </thead>
                    <tbody id="lista-historial"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="logic.js"></script>
</body>
</html>
