<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guácharo Analítico Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-4">
    <h1 class="text-2xl font-bold text-center mb-6 text-yellow-500">Guácharo Activo 🦜</h1>

    <div class="bg-gray-800 p-4 rounded-lg shadow-lg mb-6 border border-gray-700">
        <h2 id="titulo-operacion" class="text-lg font-semibold mb-3 text-gray-300 border-b border-gray-700 pb-2 text-center text-sm uppercase">Anotar Resultado</h2>
        
        <input type="hidden" id="id_editar" value="">

        <label class="text-[10px] text-gray-400 uppercase font-bold">Animalito o Número:</label>
        <input type="text" id="animalito" placeholder="Ej: Delfín o 0" class="w-full p-2 mb-3 rounded bg-gray-700 border border-gray-600 text-white outline-none">
        
        <label class="text-[10px] text-gray-400 uppercase font-bold">Fecha del Sorteo:</label>
        <input type="date" id="fecha_manual" class="w-full p-2 mb-3 rounded bg-gray-700 border border-gray-600 text-white">
        
        <label class="text-[10px] text-gray-400 uppercase font-bold">Hora del Sorteo:</label>
        <input type="time" id="hora" class="w-full p-2 mb-4 rounded bg-gray-700 border border-gray-600 text-white">

        <button id="btn-accion" onclick="guardarOActualizar()" class="w-full bg-yellow-600 hover:bg-yellow-700 text-white font-bold py-3 rounded-lg mb-3 shadow-md active:scale-95 transition-all">
            💾 GUARDAR RESULTADO
        </button>

        <button id="btn-cancelar" onclick="limpiarFormulario()" class="hidden w-full bg-gray-600 text-white font-bold py-2 rounded-lg mb-3">
            CANCELAR EDICIÓN
        </button>

        <button onclick="ejecutarAnalisis()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg active:scale-95 transition-all">
            📊 MODO ANALISTA (7 DÍAS)
        </button>
    </div>

    <div id="seccion-analisis" class="hidden mb-8">
        <div id="grid-analisis" class="grid grid-cols-2 gap-3"></div>
    </div>

    <div id="lista-resultados" class="space-y-2">
        <h3 class="text-yellow-500 font-bold mb-3 text-sm italic">Toca el lápiz 📝 para corregir un error:</h3>
        </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
