<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRCA Intelligence v3.0</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body onload="verificarAcceso()">
    <header class="main-header">
        <div class="logo">🛰️ ANALIZADOR CRCA Hub</div>
        <div id="reloj" class="reloj">00:00:00</div>
    </header>

    <main class="dashboard">
        <section class="glass-panel">
            <h3>📥 Registro de Movimientos</h3>
            <div class="input-grid">
                <input type="date" id="fecha" value="2026-04-09">
                <select id="hora">
                    <option value="08:00 AM">08:00 AM</option>
                    <option value="09:00 AM">09:00 AM</option>
                    <option value="10:00 AM">10:00 AM</option>
                    <option value="11:00 AM">11:00 AM</option>
                    <option value="12:00 PM">12:00 PM</option>
                    <option value="01:00 PM">01:00 PM</option>
                    <option value="02:00 PM">02:00 PM</option>
                    <option value="03:00 PM">03:00 PM</option>
                    <option value="04:00 PM">04:00 PM</option>
                    <option value="05:00 PM">05:00 PM</option>
                    <option value="06:00 PM">06:00 PM</option>
                    <option value="07:00 PM">07:00 PM</option>
                </select>
                <input type="text" id="num" placeholder="Nº (00-75)" maxlength="2">
                <button class="btn-glow" onclick="guardarDato()">INCRUSTAR DATO</button>
            </div>
            <div id="msg-api"></div>
        </section>

        <section class="glass-panel stats-center">
            <div class="target-card">
                <h4>🎯 OBJETIVO 75</h4>
                <div id="count-75" class="stat-main">0</div>
                <p>Veces en el historial</p>
            </div>
            <div class="predict-card">
                <h4>🔥 PREDICCIÓN (70%)</h4>
                <div id="prediccion" class="stat-sub">ANALIZANDO...</div>
                <small id="animal-sugerido"></small>
            </div>
        </section>

        <section class="glass-panel wide">
            <h3>📜 Historial Detallado (Matriz de Datos)</h3>
            <div class="scroll-table">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Hora</th>
                            <th>Nº</th>
                            <th>Animal</th>
                            <th>Grupo</th>
                            <th>Control</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpo-datos"></tbody>
                </table>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
