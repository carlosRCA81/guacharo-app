<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador CRCA - Pro</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .panel-diario { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 15px; background: #0f172a; padding: 10px; border-radius: 8px; font-size: 0.7rem;}
        .hora-box { background: #334155; padding: 8px; text-align: center; border-radius: 4px; border: 1px solid #475569; color: #f8fafc; cursor: pointer;}
        .hora-box.jugado { background: #22c55e !important; color: #0f172a; font-weight: bold;}
        .hora-box.active-select { border: 2px solid #38bdf8 !important; }
        
        .entrada-rapida-container { background: #0f172a; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #38bdf8; display: flex; gap: 10px; align-items: center;}
        .entrada-rapida-container h4 { margin: 0; color: #38bdf8; font-size: 0.8rem; flex-shrink: 0;}
        #num-rapido { background: #1e293b; color: #fbbf24; border: none; padding: 8px; border-radius: 4px; font-size: 1rem; font-weight: bold; width: 60px; text-align: center;}

        .filtro-historial { background: #1e293b; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: flex; gap: 5px; }
        .filtro-historial select { font-size: 0.8rem; padding: 5px; }

        .animal-btn { background: #334155; padding: 10px; text-align: center; border-radius: 5px; border: 1px solid #475569; cursor: pointer; transition: 0.2s; }
        .animal-btn:active { background: #38bdf8; color: #0f172a; }
        
        .row-guacharo { background: rgba(251, 191, 36, 0.2) !important; color: #fbbf24; font-weight: bold; border-left: 4px solid #fbbf24; }
        .probabilidad-alta { color: #22c55e; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="login-screen">
        <h2 style="text-align: center; color: #38bdf8;">SISTEMA CRCA ENCRIPTADO</h2>
        <input type="password" id="access-key" placeholder="Introduce tu clave">
        <button onclick="checkAccess()">DESBLOQUEAR SISTEMA</button>
    </div>

    <div id="main-app" style="display: none;">
        <header>
            <h1>ANALIZADOR CRCA</h1>
            <div id="live-clock">00:00:00</div>
            
            <div class="tab-container">
                <button class="tab-btn active" onclick="openTab(event, 'registro')">REGISTRO</button>
                <button class="tab-btn" onclick="openTab(event, 'estudio')">ESTUDIO 75</button>
                <button class="tab-btn" onclick="openTab(event, 'stats-gen')">PATRONES</button>
                <button class="tab-btn" onclick="openTab(event, 'historial')">HISTORIAL</button>
            </div>
        </header>

        <section id="registro" class="tab-content active">
            <div class="panel-diario" id="panel-diario-sorteos"></div>
            <div class="controls-row">
                <input type="date" id="fecha-analisis">
            </div>
            <div class="entrada-rapida-container">
                <h4>NÚMERO:</h4>
                <input type="text" id="num-rapido" maxlength="2" inputmode="numeric">
                <button onclick="registrarPorNumero()">OK</button>
            </div>
            <div class="display-reciente">
                <p>Último: <span id="last-num">--</span></p>
                <button id="btn-borrar" class="btn-danger">BORRAR</button>
            </div>
            <div class="grid-animales" id="grid-container" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; max-height: 300px; overflow-y: auto;"></div>
        </section>

        <section id="estudio" class="tab-content">
            <h3>INTELIGENCIA GUACHARO (75)</h3>
            <div class="card-stats" style="background: #0f172a; border: 1px solid #fbbf24; text-align: center;">
                <p style="font-size: 0.9rem; color: #fbbf24; margin-bottom: 5px;">ESTADO ACTUAL</p>
                <div style="font-size: 2rem; font-weight: 900; color: #fff;"><span id="dias-sin-75">0</span> <small style="font-size: 1rem;">Sorteos Sin Salir</small></div>
            </div>
            <div id="resultado-patrones-guacharo" style="margin-top:15px;"></div>
            <p id="alerta-probabilidad" style="text-align:center;"></p>
        </section>

        <section id="stats-gen" class="tab-content">
            <h3>PATRONES POR ANIMAL</h3>
            <div class="search-box" style="display:flex; gap:5px;">
                <select id="select-animal-estudio"></select>
                <button onclick="estudiarAnimalEspecifico()">VER</button>
            </div>
            <div id="resultado-patrones"></div>
        </section>

        <section id="historial" class="tab-content">
            <h3>DATOS ACUMULADOS</h3>
            <div class="filtro-historial">
                <select id="filtro-mes">
                    <option value="01">Enero</option><option value="02">Febrero</option>
                    <option value="03">Marzo</option><option value="04">Abril</option>
                    <option value="05">Mayo</option><option value="06">Junio</option>
                    <option value="07">Julio</option><option value="08">Agosto</option>
                    <option value="09">Septiembre</option><option value="10">Octubre</option>
                    <option value="11">Noviembre</option><option value="12">Diciembre</option>
                </select>
                <select id="filtro-anio">
                    <option value="2026">2026</option>
                    <option value="2025">2025</option>
                </select>
                <button onclick="cargarHistorialFiltrado()" style="width:auto; padding:5px 10px;">BUSCAR</button>
            </div>
            <div class="tabla-contenedor">
                <table>
                    <thead>
                        <tr><th>Fecha</th><th>Hora</th><th>Nro</th><th>Animal</th></tr>
                    </thead>
                    <tbody id="lista-historial"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="security.js"></script>
    <script src="logic.js"></script>
</body>
</html>
