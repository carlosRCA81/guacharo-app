<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador CRCA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
    <header class="bg-slate-800 p-4 border-b border-amber-600 shadow-lg flex justify-between">
        <h1 class="text-xl font-bold text-amber-500 uppercase">Analizador CRCA</h1>
        <p id="status_text" class="text-red-400 font-mono text-[10px]">● DESCONECTADO</p>
    </header>

    <main class="container mx-auto p-4 space-y-4">
        <section class="bg-slate-800 p-6 rounded-xl border border-slate-700">
            <form id="formCaptura" class="grid gap-4">
                <input type="date" id="fecha" required class="bg-slate-700 p-3 rounded text-white border border-slate-600">
                <select id="hora" required class="bg-slate-700 p-3 rounded text-white border border-slate-600">
                    <option value="08:00 AM">08:00 AM</option><option value="09:00 AM">09:00 AM</option>
                    <option value="10:00 AM">10:00 AM</option><option value="11:00 AM">11:00 AM</option>
                    <option value="12:00 PM">12:00 PM</option><option value="01:00 PM">01:00 PM</option>
                    <option value="04:00 PM">04:00 PM</option><option value="05:00 PM">05:00 PM</option>
                    <option value="06:00 PM">06:00 PM</option><option value="07:00 PM">07:00 PM</option>
                </select>
                <input type="number" id="numero" placeholder="Número" required class="bg-slate-700 p-3 rounded text-white text-lg font-bold">
                <button type="submit" id="btnGuardar" class="bg-amber-600 text-white font-black py-4 rounded uppercase">GUARDAR</button>
            </form>
        </section>

        <section class="bg-slate-800 rounded-xl overflow-hidden border border-slate-700">
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-900 text-slate-400">
                    <tr><th class="p-4">HORA</th><th class="p-4 text-center">N°</th><th class="p-4">ANIMAL</th></tr>
                </thead>
                <tbody id="cuerpoTabla" class="divide-y divide-slate-700"></tbody>
            </table>
        </section>
    </main>

    <script>
        // DATOS REALES EXTRAÍDOS DE TUS CAPTURAS
        const URL_SB = "https://iyvbufxkgycqcmdeclsf.supabase.co"; 
        const KEY_SB = "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5dmJ1ZnhrZ3ljcWNtZGVjbHNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzOTE5NTMsImV4cCI6MjA4OTk2Nzk1M30.Rt6XfnsvWu1Efwb3-fVOyHCmz7aCJXHpIJxaxGzuThw";

        const sb = supabase.createClient(URL_SB, KEY_SB);

        async function cargar() {
            const { data, error } = await sb.from('estudio_algoritmo').select('*').order('created_at', { ascending: false }).limit(10);
            if (error) {
                document.getElementById('status_text').innerText = "● ERROR API";
                document.getElementById('status_text').className = "text-red-400 font-mono text-[10px]";
            } else {
                document.getElementById('status_text').innerText = "● ONLINE";
                document.getElementById('status_text').className = "text-green-400 font-mono text-[10px]";
                document.getElementById('cuerpoTabla').innerHTML = data.map(r => `<tr><td class="p-4">${r.hora}</td><td class="p-4 text-center text-amber-500 font-bold">${r.numero}</td><td class="p-4 font-bold">${r.animal}</td></tr>`).join('');
            }
        }

        document.getElementById('formCaptura').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnGuardar');
            btn.disabled = true;
            
            const num = document.getElementById('numero').value.padStart(2, '0');
            const { error } = await sb.from('estudio_algoritmo').insert([{ 
                fecha: document.getElementById('fecha').value, 
                hora: document.getElementById('hora').value, 
                numero: num,
                animal: "ANIMAL " + num // Simplificado para probar conexión
            }]);

            if (error) alert("Error: " + error.message);
            else { document.getElementById('numero').value = ''; await cargar(); }
            btn.disabled = false;
        });

        window.onload = () => {
            document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
            cargar();
        };
    </script>
</body>
</html>
