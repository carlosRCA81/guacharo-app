<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-GATE NEXUS PRO - Intelligence System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { border-bottom: 3px solid #eab308; color: #eab308; background: #1e293b; }
        .hidden { display: none; }
        .bg-agua { background: #1d4ed8; } /* Azul Ballena/Delfín */
        .bg-tierra { background: #78350f; } /* Marrón */
        .bg-aire { background: #0ea5e9; } /* Celeste Paloma/75 */
        .bg-insecto { background: #15803d; } /* Verde */
        .cell-excel { border: 1px solid #1e293b; padding: 8px; text-align: center; font-weight: 900; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans">

    <nav class="flex sticky top-0 z-50 bg-slate-900 border-b border-slate-800 overflow-x-auto">
        <button onclick="ver('registro')" id="btn-registro" class="flex-1 py-4 text-[10px] font-black uppercase tab-active">Registro</button>
        <button onclick="ver('matriz')" id="btn-matriz" class="flex-1 py-4 text-[10px] font-black uppercase">Matriz Excel</button>
        <button onclick="ver('inteligencia')" id="btn-inteligencia" class="flex-1 py-4 text-[10px] font-black uppercase italic">Algoritmo</button>
        <button onclick="ver('saltos')" id="btn-saltos" class="flex-1 py-4 text-[10px] font-black uppercase">Saltos</button>
    </nav>

    <section id="panel-registro" class="p-4">
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-2xl mb-6">
            <div class="flex justify-between items-center mb-6">
                <div id="reloj" class="text-2xl font-black text-yellow-500 font-mono">00:00:00</div>
                <div class="text-[8px] bg-red-900/20 text-red-500 border border-red-900 px-2 py-1 rounded font-black">SCANNER ACTIVO</div>
            </div>
            <div class="space-y-4">
                <input type="number" id="num_input" placeholder="N° ANIMAL" class="w-full bg-slate-800 border-2 border-slate-700 p-5 rounded-xl text-center text-5xl font-black text-white focus:border-yellow-600 outline-none">
                <div class="grid grid-cols-2 gap-2">
                    <input type="date" id="fec_input" class="bg-slate-800 p-4 rounded-xl border border-slate-700 font-bold text-xs text-center">
                    <select id="hor_input" class="bg-slate-800 p-4 rounded-xl border border-slate-700 font-bold text-xs text-center">
                        <option value="08:00">08:00 AM</option><option value="12:00">12:00 PM</option>
                        <option value="16:00">04:00 PM</option><option value="19:00">07:00 PM</option>
                    </select>
                </div>
                <button onclick="registrar()" class="w-full bg-yellow-600 py-5 rounded-xl font-black uppercase text-sm shadow-lg active:scale-95 transition-all">Cargar a Base de Datos</button>
            </div>
        </div>
        <div id="log-hoy" class="space-y-2"></div>
    </section>

    <section id="panel-matriz" class="p-4 hidden">
        <div class="bg-slate-900 rounded-xl border border-slate-800 overflow-hidden shadow-2xl">
            <table class="w-full text-[10px]">
                <thead class="bg-slate-950 text-yellow-500 uppercase">
                    <tr>
                        <th class="p-3 border border-slate-800">HORA</th>
                        <th class="p-3 border border-slate-800">LUN</th>
                        <th class="p-3 border border-slate-800">MAR</th>
                        <th class="p-3 border border-slate-800">MIE</th>
                        <th class="p-3 border border-slate-800">JUE</th>
                    </tr>
                </thead>
                <tbody id="tabla-excel-body">
                    </tbody>
            </table>
        </div>
    </section>

    <section id="panel-inteligencia" class="p-4 hidden">
        <div id="status-algoritmo" class="bg-slate-900 p-5 rounded-2xl border border-slate-800 mb-4">
            <h3 class="text-center text-[9px] font-black uppercase text-slate-500 mb-4">Análisis de Razas y Dominio</h3>
            <div id="chart-familias" class="space-y-6"></div>
        </div>
    </section>

    <section id="panel-saltos" class="p-4 hidden">
        <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800">
            <h3 class="text-center text-[9px] font-black uppercase text-yellow-500 mb-6">Si sale X, probablemente sigue Y</h3>
            <div id="lista-saltos" class="space-y-4 font-mono text-xs"></div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
