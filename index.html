<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUÁCHARO NEXUS 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen font-sans">

    <header class="p-4 border-b border-amber-600/30 flex justify-between items-center bg-[#1e293b]">
        <h1 class="text-amber-500 font-black italic tracking-tighter">GUÁCHARO NEXUS 2026</h1>
        <div id="status" class="text-[10px] font-mono px-2 py-1 rounded border border-red-500 text-red-500 bg-red-500/10">● DESCONECTADO</div>
    </header>

    <main class="p-4 max-w-md mx-auto space-y-4">
        
        <div class="bg-[#1e293b] p-6 rounded-2xl border border-slate-700 shadow-2xl">
            <h2 class="text-xs font-bold text-slate-400 uppercase mb-4 tracking-widest">Nueva Jugada</h2>
            <form id="vgate_form" class="space-y-4">
                <input type="date" id="f" required class="w-full bg-slate-800 p-4 rounded-xl border border-slate-600 outline-none focus:border-amber-500">
                <select id="h" required class="w-full bg-slate-800 p-4 rounded-xl border border-slate-600 outline-none">
                    <option value="08:00 AM">08:00 AM</option><option value="09:00 AM">09:00 AM</option>
                    <option value="10:00 AM">10:00 AM</option><option value="11:00 AM">11:00 AM</option>
                    <option value="12:00 PM">12:00 PM</option><option value="01:00 PM">01:00 PM</option>
                    <option value="04:00 PM">04:00 PM</option><option value="05:00 PM">05:00 PM</option>
                    <option value="06:00 PM">06:00 PM</option><option value="07:00 PM">07:00 PM</option>
                </select>
                <input type="number" id="n" placeholder="Número" required class="w-full bg-slate-800 p-4 rounded-xl border border-slate-600 text-3xl font-black text-amber-500 text-center">
                <button type="submit" id="btn" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-black py-4 rounded-xl transition-all shadow-lg shadow-amber-900/40">GUARDAR EN NEXUS</button>
            </form>
        </div>

        <div class="bg-[#1e293b] rounded-2xl border border-slate-700 overflow-hidden">
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-800 text-slate-500 text-[10px] uppercase">
                    <tr><th class="p-4">Sorteo</th><th class="p-4 text-center">N°</th><th class="p-4">Animal</th></tr>
                </thead>
                <tbody id="lista" class="divide-y divide-slate-700"></tbody>
            </table>
        </div>
    </main>

    <script>
        // CONFIGURACIÓN PROYECTO CURATOROS
        const SB_URL = "https://iyvbufxkgycqcmdeclsf.supabase.co";
        const SB_KEY = "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5dmJ1ZnhrZ3ljcWNtZGVjbHNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzOTE5NTMsImV4cCI6MjA4OTk2Nzk1M30.Rt6XfnsvWu1Efwb3-fVOyHCmz7aCJXHpIJxaxGzuThw";

        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const animales = {"00":"BALLENA","01":"CARNERO","02":"TORO","03":"CIEMPIÉS","04":"ALACRÁN","05":"LEÓN","06":"RANA","07":"PERICO","08":"RATÓN","09":"ÁGUILA","10":"TIGRE","11":"GATO","12":"CABALLO","13":"MONO","14":"PALOMA","15":"ZORRO","16":"OSO","17":"PAVO","18":"BURRO","19":"CHIVO","20":"COCHINO","21":"GALLO","22":"CAMELLO","23":"CEBRA","24":"IGUANA","25":"GALLINA","26":"VACA","27":"PERRO","28":"ZAMURO","29":"ELEFANTE","30":"CAIMÁN","31":"LAPA","32":"ARDILLA","33":"PESCADO","34":"VENADO","35":"JIRAFA","36":"CULEBRA","75":"GUÁCHARO"};

        async function cargar() {
            try {
                const { data, error } = await supabaseClient.from('estudio_algoritmo').select('*').order('id', { ascending: false }).limit(8);
                if (error) throw error;
                
                document.getElementById('status').innerText = "● SISTEMA ONLINE";
                document.getElementById('status').className = "text-[10px] font-mono px-2 py-1 rounded border border-green-500 text-green-500 bg-green-500/10";
                
                document.getElementById('lista').innerHTML = data.map(r => `
                    <tr>
                        <td class="p-4 text-[10px] text-slate-400 font-mono">${r.fecha}<br>${r.hora}</td>
                        <td class="p-4 text-center font-black text-amber-500 text-xl">${r.numero}</td>
                        <td class="p-4 text-xs font-bold uppercase tracking-tighter">${r.animal}</td>
                    </tr>`).join('');
            } catch (e) {
                document.getElementById('status').innerText = "● ERROR DE CONEXIÓN";
            }
        }

        document.getElementById('vgate_form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const b = document.getElementById('btn');
            b.disabled = true; b.innerText = "ENVIANDO...";

            const n = document.getElementById('n').value.padStart(2, '0');
            const { error } = await supabaseClient.from('estudio_algoritmo').insert([{
                fecha: document.getElementById('f').value,
                hora: document.getElementById('h').value,
                numero: n,
                animal: animales[n] || "ANIMAL " + n
            }]);

            if (error) alert("ERROR SUPABASE: " + error.message);
            else { document.getElementById('n').value = ''; await cargar(); }
            b.disabled = false; b.innerText = "GUARDAR EN NEXUS";
        });

        window.onload = () => {
            document.getElementById('f').value = new Date().toISOString().split('T')[0];
            cargar();
        };
    </script>
</body>
</html>
