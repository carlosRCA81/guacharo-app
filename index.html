<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador CRCA - Algoritmo 100%</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .panel-diario { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 15px; background: #0f172a; padding: 10px; border-radius: 8px; }
        .hora-box { background: #334155; padding: 8px; text-align: center; border-radius: 4px; border: 1px solid #475569; color: #f8fafc; cursor: pointer; font-size: 0.65rem;}
        .hora-box.jugado { background: #22c55e !important; color: #0f172a; font-weight: bold;}
        .hora-box.active-select { border: 2px solid #38bdf8 !important; background: #1e293b; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; margin-right: 5px; color: white; margin-top: 5px; display: inline-block; }
        .bg-espejo { background: #a855f7; }
        .bg-escalera { background: #f59e0b; }
        .bg-repetido { background: #ef4444; }
        .row-guacharo { background: rgba(251, 191, 36, 0.2) !important; color: #fbbf24; }
        .animal-btn { background:#334155; padding:5px; text-align:center; border-radius:4px; cursor:pointer; font-size:0.65rem; color:white; border: 1px solid #475569;}
        .card-prediccion { background: #1e293b; border-radius: 8px; padding: 12px; margin-bottom: 15px; border: 1px solid #38bdf8; }
        .dato-fijo { background: #0f172a; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #38bdf8; border: 2px solid #38bdf8; }
    </style>
</head>
<body>
    <div id="main-app">
        <header>
            <h1>ANALIZADOR CRCA PRO</h1>
            <div id="live-clock">00:00:00</div>
            <div class="tab-container">
                <button class="tab-btn active" onclick="openTab(event, 'registro')">REGISTRO</button>
                <button class="tab-btn" onclick="openTab(event, 'estudio-avanzado')">ALGORITMO</button>
                <button class="tab-btn" onclick="openTab(event, 'historial')">HISTORIAL</button>
            </div>
        </header>

        <section id="registro" class="tab-content active">
            <div class="card-prediccion">
                <p style="font-size: 0.7rem; color: #38bdf8; margin: 0 0 10px 0; text-align: center; font-weight: bold;">🎯 3 DATOS FIJOS PARA HOY</p>
                <div style="display: flex; justify-content: space-around;" id="contenedor-fijos">
                    <div class="dato-fijo">--</div>
                    <div class="dato-fijo">--</div>
                    <div class="dato-fijo">--</div>
                </div>
            </div>

            <div class="panel-diario" id="panel-diario-sorteos"></div>
            
            <div id="alertas-algoritmo" style="margin-bottom: 10px;"></div>

            <div class="controls-row">
                <input type="date" id="fecha-analisis" style="width:100%; margin-bottom:10px;">
            </div>

            <div class="entrada-rapida-container" style="display:flex; gap:10px; margin-bottom:15px;">
                <input type="text" id="num-rapido" maxlength="2" placeholder="00" style="width:60px; text-align:center; font-weight:bold;">
                <button onclick="registrarPorNumero()" style="flex-grow:1;">ANOTAR RESULTADO</button>
            </div>
            <div class="grid-animales" id="grid-container" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:5px;"></div>
        </section>

        <section id="estudio-avanzado" class="tab-content" style="display:none;">
            <h3>Sugerencias por Elemento</h3>
            <div id="sugerencias-elemento" style="margin-bottom: 20px;"></div>

            <h3>ESTUDIO DE PATRONES</h3>
            <select id="select-estudio-animal" onchange="estudiarAnimalPatron()" style="width:100%; padding:10px; margin-bottom:15px;">
                <option value="">-- Selecciona Animal --</option>
            </select>
            <div id="resultado-patron-avanzado"></div>
            
            <hr style="border: 0.5px solid #334155; margin: 20px 0;">
            
            <h3>ESTADO GUACHARO (75)</h3>
            <div class="card-stats" style="text-align:center; padding:15px; background:#0f172a; border-radius:10px; border:1px solid #fbbf24;">
                <p style="color:#fbbf24; margin:0;">SORTEOS SIN SALIR</p>
                <div id="dias-sin-75" style="font-size:2.5rem; font-weight:bold;">0</div>
            </div>
        </section>

        <section id="historial" class="tab-content" style="display:none;">
            <div style="background: #0f172a; padding: 10px; border-radius: 8px; margin-bottom: 10px;">
                <label style="font-size: 0.7rem; color: #38bdf8;">FILTRAR POR FECHA:</label>
                <input type="date" id="fecha-busqueda-historial" onchange="actualizarTabla()" style="width:100%;">
            </div>
            <div class="tabla-contenedor" style="max-height: 400px; overflow-y: auto;">
                <table style="width:100%; border-collapse: collapse; font-size: 0.75rem;">
                    <thead>
                        <tr style="background:#1e293b; color:#38bdf8;">
                            <th>Fecha</th><th>Hora</th><th>Nro</th><th>Animal</th>
                        </tr>
                    </thead>
                    <tbody id="lista-historial" style="text-align:center;"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="logic.js"></script>
</body>
</html>
