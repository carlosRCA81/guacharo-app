<div class="p-4 bg-gray-900 text-white min-h-screen">
    <h2 class="text-xl font-bold mb-4 text-green-400">V-GATE NEXUS: Matriz de Inteligencia</h2>

    <div class="bg-gray-800 p-4 rounded-lg mb-6 border border-gray-700">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-xs text-gray-400">Hora</label>
                <input type="time" id="input_hora" class="w-full bg-gray-700 rounded p-2 text-white border-none">
            </div>
            <div>
                <label class="block text-xs text-gray-400">Número</label>
                <input type="number" id="input_numero" placeholder="Ej. 75" class="w-full bg-gray-700 rounded p-2 text-white border-none">
            </div>
        </div>
        <button onclick="registrarDato()" class="w-full mt-4 bg-green-600 hover:bg-green-500 py-2 rounded font-bold transition">
            REGISTRAR EN MATRIZ
        </button>
    </div>

    <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse bg-gray-800 rounded-lg overflow-hidden">
            <thead class="bg-gray-700 text-gray-300 text-xs uppercase">
                <tr>
                    <th class="p-3 border-b border-gray-600">Hora</th>
                    <th class="p-3 border-b border-gray-600">N°</th>
                    <th class="p-3 border-b border-gray-600">Animal</th>
                    <th class="p-3 border-b border-gray-600">Reino</th>
                    <th class="p-3 border-b border-gray-600">Grupo</th>
                </tr>
            </thead>
            <tbody id="tabla_matriz" class="text-sm">
                </tbody>
        </table>
    </div>
</div>

<script>
// El "ADN" de los animales para el Radar de Reinos
const base_datos_animales = {
    75: { nombre: "Mono", reino: "Tierra", grupo: "Primates" },
    12: { nombre: "Caballo", reino: "Fuego", grupo: "Mamíferos" },
    0:  { nombre: "Delfín", reino: "Agua", grupo: "Acuáticos" }
    // Aquí iremos añadiendo el resto de la lista
};

function registrarDato() {
    const num = document.getElementById('input_numero').value;
    const hora = document.getElementById('input_hora').value;
    const info = base_datos_animales[num] || { nombre: "S/N", reino: "Desconocido", grupo: "General" };

    // Aquí iría tu fetch a Supabase para guardar, 
    // pero primero vamos a visualizarlo en la Matriz
    const fila = `
        <tr class="border-b border-gray-700 hover:bg-gray-750 transition">
            <td class="p-3 text-gray-400 font-mono">${hora}</td>
            <td class="p-3 font-bold text-green-400">${num}</td>
            <td class="p-3 font-semibold">${info.nombre}</td>
            <td class="p-3"><span class="px-2 py-1 rounded text-xs bg-blue-900 text-blue-200">${info.reino}</span></td>
            <td class="p-3 text-gray-500 text-xs">${info.grupo}</td>
        </tr>
    `;
    document.getElementById('tabla_matriz').innerHTML = fila + document.getElementById('tabla_matriz').innerHTML;
}
</script>
