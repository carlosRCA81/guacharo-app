<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador CRCA - Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>
    <div id="login-screen">
        <h2>SISTEMA CRCA ENCRIPTADO</h2>
        <input type="password" id="access-key" placeholder="Introduce tu clave">
        <button onclick="checkAccess()">DESBLOQUEAR SISTEMA</button>
    </div>

    <div id="main-app" style="display: none;">
        <header>
            <h1>ANALIZADOR CRCA</h1>
            <div id="live-clock">00:00:00</div>
            <div class="tab-container">
                <button class="tab-btn active" onclick="openTab(event, 'registro')">REGISTRO</button>
                <button class="tab-btn" onclick="openTab(event, 'estudio')">ESTUDIO 75</button>
                <button class="tab-btn" onclick="openTab(event, 'stats-gen')">PATRONES</button>
                <button class="tab-btn" onclick="openTab(event, 'historial')">HISTORIAL</button>
            </div>
        </header>

        <section id="registro" class="tab-content active">
            <div class="panel-diario" id="panel-diario-sorteos"></div>
            <div class="controls-row">
                <input type="date" id="fecha-analisis">
            </div>
            <div class="entrada-rapida-container">
                <h4>ENTRADA RÁPIDA:</h4>
                <input type="text" id="num-rapido" maxlength="2" placeholder="Nro">
                <button onclick="registrarPorNumero()">OK</button>
            </div>
            <div class="display-reciente">
                <p>Último: <span id="last-num">--</span></p>
                <button id="btn-borrar" class="btn-danger">BORRAR</button>
            </div>
            <div id="grid-container" class="grid-animales"></div>
        </section>

        <section id="estudio" class="tab-content">
            <h3>INTELIGENCIA GUACHARO (75)</h3>
            <div class="card-stats">
                <p>ESTADO DEL GUACHARO</p>
                <div style="font-size: 2rem;"><span id="dias-sin-75">0</span> <small>Días</small></div>
            </div>
            <div id="resultado-patrones-guacharo" class="alerta-algoritmo"></div>
            <div id="balance-elementos">
                <span>🌬️ AIRE: <strong id="val-aire">0</strong></span>
                <span>🌱 TIERRA: <strong id="val-tierra">0</strong></span>
                <span>💧 AGUA: <strong id="val-agua">0</strong></span>
            </div>
            <div class="stat-card-mini">
                <h4>⚠️ DORMIDOS:</h4>
                <div id="lista-dormidos">Analizando...</div>
            </div>
        </section>

        <section id="stats-gen" class="tab-content">
            <h3>PATRONES POR ANIMAL</h3>
            <div class="search-box">
                <select id="select-animal-estudio"></select>
                <button onclick="estudiarAnimalEspecifico()">VER</button>
            </div>
            <div id="resultado-patrones"></div>
        </section>

        <section id="historial" class="tab-content">
            <h3>DATOS ACUMULADOS</h3>
            <div class="search-box" style="display:flex; gap:5px; background:#1e293b; padding:10px; border-radius:8px;">
                <input type="date" id="fecha-consulta-historial">
                <button onclick="consultarFechaEspecifica()">ACEPTAR</button>
            </div>
            <div class="tabla-contenedor">
                <table>
                    <thead>
                        <tr><th>Fecha</th><th>Hora</th><th>Nº</th><th>Animal</th><th>Tipo</th></tr>
                    </thead>
                    <tbody id="lista-historial"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="security.js"></script>
    <script src="Logic.js"></script>
</body>
</html>
