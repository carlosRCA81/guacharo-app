<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador CRCA - Guácharo Activo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1e293b; color: #f8fafc; }
        .card { background-color: #334155; border: 1px solid #475569; }
        .btn-action { transition: all 0.3s; }
        .btn-action:active { transform: scale(0.95); }
    </style>
</head>
<body class="p-4 font-sans">

    <header class="mb-6 text-center">
        <h1 class="text-2xl font-bold text-blue-400">ANALIZADOR CRCA</h1>
        <p class="text-xs text-slate-400">Sistema de Predicción V-GATE NEXUS</p>
    </header>

    <div class="card p-5 rounded-xl shadow-2xl mb-6">
        <h2 class="text-lg font-semibold mb-4 border-b border-slate-500 pb-2">Registrar Sorteo</h2>
        
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-xs mb-1">Hora del Sorteo</label>
                <select id="hora" class="w-full bg-slate-800 p-2 rounded border border-slate-600">
                    <option value="08:00">08:00 AM</option>
                    <option value="09:00">09:00 AM</option>
                    <option value="10:00">10:00 AM</option>
                    <option value="11:00">11:00 AM</option>
                    <option value="12:00">12:00 PM</option>
                    <option value="13:00">01:00 PM</option>
                    <option value="17:00">05:00 PM</option> </select>
            </div>
            <div>
                <label class="block text-xs mb-1">Número Ganador</label>
                <input type="text" id="numero" placeholder="Ej: 00 o 75" 
                       class="w-full bg-slate-800 p-2 rounded border border-slate-600 text-center font-bold text-yellow-400">
            </div>
        </div>

        <div class="flex gap-2 mt-4">
            <button onclick="guardarResultado()" class="btn-action flex-1 bg-green-600 hover:bg-green-500 p-3 rounded-lg font-bold shadow-lg">
                ANOTAR
            </button>
            <button onclick="limpiarCampos()" class="btn-action bg-red-600 hover:bg-red-500 p-3 rounded-lg font-bold shadow-lg">
                BORRAR
            </button>
        </div>
    </div>

    <div class="card p-4 rounded-xl border-l-4 border-yellow-500 mb-6">
        <h3 class="text-sm font-bold text-yellow-500 uppercase">Radar del Guácharo (75)</h3>
        <div id="status-75" class="text-xs mt-1">Esperando datos para analizar patrón...</div>
    </div>

    <div class="overflow-x-auto">
        <table class="w-full text-left text-sm card rounded-xl overflow-hidden">
            <thead class="bg-slate-700 text-slate-300">
                <tr>
                    <th class="p-3">Hora</th>
                    <th class="p-3 text-center">Nº</th>
                    <th class="p-3">Animal</th>
                </tr>
            </thead>
            <tbody id="tabla-resultados">
                <tr class="border-t border-slate-600">
                    <td class="p-3 text-slate-400" colspan="3 text-center">No hay registros hoy</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        // Aquí conectaremos con tu Supabase usando el link que ya tienes
        function limpiarCampos() {
            document.getElementById('numero').value = '';
            console.log("Campos limpios");
        }

        async function guardarResultado() {
            const num = document.getElementById('numero').value;
            const hora = document.getElementById('hora').value;
            
            if(!num) return alert("Escribe un número");
            
            // Lógica para enviar a Supabase (Paso siguiente)
            console.log(`Guardando: ${num} a las ${hora}`);
        }
    </script>
</body>
</html>
