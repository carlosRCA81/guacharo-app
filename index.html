<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador CRCA - Sistema Profesional</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen">
        <h1>SISTEMA CRCA</h1>
        <input type="password" id="access-key" placeholder="Clave Maestra">
        <button onclick="checkAccess()">ENTRAR</button>
    </div>

    <div id="main-app" style="display:none;">
        <div id="live-clock">00:00:00</div>
        
        <section class="entrada-rapida-container">
            <h4>REGISTRO RÁPIDO:</h4>
            <input type="text" id="num-rapido" placeholder="Nro" maxlength="2">
            <button onclick="registrarRapido()">GUARDAR</button>
        </section>

        <div class="tab-container">
            <button class="tab-btn active" onclick="openTab(event, 'panel')">PANEL</button>
            <button class="tab-btn" onclick="openTab(event, 'stats-gen')">PATRONES</button>
            <button class="tab-btn" onclick="openTab(event, 'historial')">HISTORIAL</button>
        </div>

        <section id="panel" class="tab-content active">
            <div class="display-reciente">
                <span>ÚLTIMO: <strong id="last-num">--</strong></span>
                <button class="btn-danger" onclick="borrarUltimo()">BORRAR</button>
            </div>
            <div class="stat-card-mini">
                <h4>DÍAS SIN EL ESPECIAL (75):</h4>
                <div id="dias-sin-75" style="font-size: 1.5rem; color: #fbbf24;">0</div>
            </div>
        </section>

        <section id="stats-gen" class="tab-content">
            <h3>ESTUDIO DE MOVIMIENTOS</h3>
            <div id="resultado-patrones"></div>
        </section>

        <section id="historial" class="tab-content">
            <div class="controls-row">
                <input type="date" id="filtro-fecha-almanaque">
                <button onclick="filtrarPorFecha()">BUSCAR FECHA</button>
                <button onclick="cargarHistorialRemoto()">VER TODO</button>
            </div>
            <div class="tabla-contenedor">
                <table>
                    <thead>
                        <tr><th>Fecha</th><th>Hora</th><th>Nro</th><th>Animal</th></tr>
                    </thead>
                    <tbody id="lista-historial"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
