<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Profesional de Sorteos</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-client@2"></script>
</head>
<body>
    <div class="container">
        <header class="card">
            <h2>Registrar Nuevo Sorteo</h2>
            <form id="formulario-registro" class="grid-form">
                <input type="date" id="reg-fecha" required>
                <input type="text" id="reg-hora" placeholder="Ej: 10:00 AM" required>
                <input type="text" id="reg-num" placeholder="Número (75 es especial)" required>
                <input type="text" id="reg-animal" placeholder="Animal" required>
                <select id="reg-tipo">
                    <option value="AIRE">AIRE</option>
                    <option value="TIERRA">TIERRA</option>
                    <option value="AGUA">AGUA</option>
                </select>
                <button type="submit" id="btn-guardar">Guardar en Supabase</button>
            </form>
        </header>

        <section class="card filtro-area">
            <h3>Historial y Estudio de Resultados</h3>
            <div class="controles">
                <input type="date" id="filtro-fecha">
                <button id="btn-buscar">Consultar Fecha</button>
                <button id="btn-ver-todo">Ver Todo el Historial</button>
            </div>
        </section>

        <section id="pantalla-estudio" class="card">
            <div id="tabla-contenedor">
                <p class="mensaje-espera">Cargando base de datos...</p>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
