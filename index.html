<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guácharo Analítico Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { border-bottom: 4px solid #ca8a04; color: #eab308; }
        .hidden { display: none; }
        .bar-chart { height: 8px; border-radius: 4px; background: #1e293b; margin-top: 4px; }
        .bar-fill { height: 100%; background: #ca8a04; transition: width 0.6s ease; }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans">
    <nav class="flex border-b border-slate-800 bg-slate-900 sticky top-0 z-50">
        <button onclick="cambiarPestana('registro')" id="tab-reg" class="flex-1 py-4 font-black text-[10px] uppercase tab-active text-center">Registro</button>
        <button onclick="cambiarPestana('historial')" id="tab-his" class="flex-1 py-4 font-black text-[10px] uppercase text-slate-500 text-center">Historial</button>
        <button onclick="cambiarPestana('analisis')" id="tab-ana" class="flex-1 py-4 font-black text-[10px] uppercase text-slate-500 text-center">Inteligencia</button>
    </nav>

    <section id="vista-registro" class="p-4">
        <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 mb-6 shadow-xl">
            <div class="flex justify-between items-center mb-4">
                <span id="reloj" class="text-yellow-500 font-mono font-bold text-xl">00:00:00</span>
                <span class="text-[9px] bg-blue-900/30 text-blue-400 px-2 py-1 rounded border border-blue-900 font-black">SISTEMA ACTIVO</span>
            </div>
            <div class="space-y-4">
                <input type="text" id="animalito" placeholder="Número o Animal" class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 text-white font-black text-2xl text-center outline-none focus:border-yellow-600">
                <div class="grid grid-cols-2 gap-2">
                    <input type="date" id="fecha_hoy" class="bg-slate-800 p-3 rounded-xl border border-slate-700 text-white text-[10px] font-bold text-center">
                    <select id="hora_manual" class="bg-slate-800 p-3 rounded-xl border border-slate-700 text-white text-[10px] font-bold text-center">
                        <option value="08:00">08:00 AM</option> <option value="09:00">09:00 AM</option>
                        <option value="10:00">10:00 AM</option> <option value="11:00">11:00 AM</option>
                        <option value="12:00">12:00 PM</option> <option value="13:00">01:00 PM</option>
                        <option value="14:00">02:00 PM</option> <option value="15:00">03:00 PM</option>
                        <option value="16:00">04:00 PM</option> <option value="17:00">05:00 PM</option>
                        <option value="18:00">06:00 PM</option> <option value="19:00">07:00 PM</option>
                    </select>
                </div>
                <button onclick="registrarSorteo()" class="w-full bg-yellow-600 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition-all uppercase text-xs">Guardar en Base de Datos</button>
            </div>
        </div>
        <div id="lista-hoy" class="space-y-2"></div>
    </section>

    <section id="vista-historial" class="p-4 hidden">
        <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 mb-6">
            <label class="text-[9px] text-yellow-500 font-black uppercase mb-2 block text-center italic">Consultar historial por fecha</label>
            <div class="flex gap-2">
                <input type="date" id="filtro_fecha" class="flex-1 bg-slate-800 p-3 rounded-lg border border-slate-700 text-white text-xs font-bold">
                <button onclick="buscarPorFecha()" class="bg-blue-700 px-4 rounded-lg text-[10px] font-black uppercase">Buscar</button>
            </div>
        </div>
        <div id="lista-historial" class="space-y-4">
            <p class="text-center text-slate-600 text-[10px]">Usa el buscador para ver días anteriores (ej: 01/04/2026)</p>
        </div>
    </section>

    <section id="vista-analisis" class="p-4 hidden">
        <div id="contenedor-algoritmo" class="bg-slate-900 p-5 rounded-2xl border border-slate-800 space-y-6">
            <h3 class="text-yellow-500 font-black text-center text-sm uppercase italic">Esquema de Probabilidades</h3>
            
            <div class="flex gap-2 mb-2">
                <select id="filtro_franja" onchange="generarEsquemaPorcentajes()" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-700 text-white text-[10px] font-black uppercase outline-none focus:border-yellow-600">
                    <option value="TODO">-- Todas las Franjas --</option>
                    <option value="MANANA">Mañana (08am - 12pm)</option>
                    <option value="TARDE">Tarde (01pm - 07pm)</option>
                </select>
            </div>

            <div id="graficos-porcentaje" class="space-y-4"></div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
