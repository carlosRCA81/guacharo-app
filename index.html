<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador CRCA - Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen">
        <h2>SISTEMA CRCA ENCRIPTADO</h2>
        <input type="password" id="access-key" placeholder="Introduce tu clave">
        <button onclick="checkAccess()">DESBLOQUEAR SISTEMA</button>
    </div>

    <div id="main-app" style="display: none;">
        <header>
            <h1>ANALIZADOR CRCA</h1>
            <div id="live-clock">00:00:00</div>
            <div class="tab-container">
                <button class="tab-btn active" onclick="openTab(event, 'registro')">REGISTRO</button>
                <button class="tab-btn" onclick="openTab(event, 'estudio')">ESTUDIO 75</button>
                <button class="tab-btn" onclick="openTab(event, 'historial')">HISTORIAL</button>
            </div>
        </header>

        <section id="registro" class="tab-content" style="display: block;">
            <div class="panel-diario" id="panel-diario-sorteos"></div>
            <input type="date" id="fecha-analisis" style="margin-bottom:10px;">
            <div class="entrada-rapida-container">
                <h4 style="margin:0; color:#38bdf8;">Nro:</h4>
                <input type="text" id="num-rapido" maxlength="2" style="width:60px; text-align:center;">
                <button onclick="registrarPorNumero()" style="width:auto; padding:5px 15px;">OK</button>
            </div>
            <div class="display-reciente">
                <span>Último: <b id="last-num">--</b></span>
                <button onclick="borrarUltimo()" class="btn-danger">BORRAR</button>
            </div>
            <div class="grid-animales" id="grid-container"></div>
        </section>

        <section id="estudio" class="tab-content" style="display: none;">
            <h3>ANÁLISIS DEL GUACHARO</h3>
            <div class="card-stats">
                <p>Días sin 75: <span id="dias-sin-75" style="color:#fbbf24; font-size:1.5rem;">0</span></p>
            </div>
        </section>

        <section id="historial" class="tab-content" style="display: none;">
            <h3>HISTORIAL TOTAL</h3>
            <select id="filtro-mes" onchange="renderizarHistorial()" style="margin-bottom:10px;">
                <option value="todos">Todo el Año</option>
                <option value="01">Enero</option>
                <option value="02">Febrero</option>
                <option value="03">Marzo</option>
                <option value="04">Abril</option>
            </select>
            <div class="tabla-contenedor">
                <table>
                    <thead><tr><th>Fecha</th><th>Hora</th><th>Nro</th><th>Animal</th><th>Tipo</th></tr></thead>
                    <tbody id="lista-historial"></tbody>
                </table>
            </div>
        </section>
    </div>
    <script src="logic.js"></script>
</body>
</html>
