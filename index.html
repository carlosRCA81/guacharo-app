<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBI-SCANNER | Algorithmic Biometrics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; color: #1e293b; font-family: 'Monaco', monospace; }
        .blueprint-grid { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid #cbd5e1; }
        .btn-gold { background: #b45309; color: white; transition: all 0.3s; }
        .btn-gold:hover { background: #92400e; transform: translateY(-2px); }
        .hidden { display: none; }
    </style>
</head>
<body class="blueprint-grid min-h-screen">

    <div id="lock-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-100">
        <div class="glass-panel p-8 rounded-3xl shadow-2xl text-center max-w-sm w-full mx-4">
            <div class="mb-6">
                <div class="text-4xl mb-2">🦅</div>
                <h2 class="text-xs font-black uppercase tracking-[0.3em] text-slate-500">GBI-SCANNER ACCESS</h2>
            </div>
            <input type="password" id="access_key" placeholder="TOKEN DE ACCESO" 
                class="w-full bg-white border border-slate-300 p-4 rounded-xl text-center mb-4 outline-none focus:border-amber-600 transition-all">
            <button onclick="validarAcceso()" class="w-full btn-gold py-4 rounded-xl font-black text-xs uppercase tracking-widest">Desbloquear Sistema</button>
            <p id="error_msg" class="text-red-500 text-[10px] mt-4 font-bold hidden uppercase">Clave Incorrecta - Acceso Denegado</p>
        </div>
    </div>

    <div id="main-system" class="hidden">
        <nav class="bg-white/90 border-b border-slate-200 sticky top-0 z-40 p-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-amber-700 font-black text-lg">GBI</span>
                <span class="text-[9px] font-bold text-slate-400 border-l border-slate-300 pl-2 uppercase tracking-tighter">Biometric Intelligence<br>v2.0 Beta</span>
            </div>
            <div id="reloj_pro" class="text-sm font-mono font-black text-slate-600">00:00:00</div>
        </nav>

        <main class="p-6 max-w-4xl mx-auto space-y-6">
            <section class="glass-panel p-6 rounded-3xl shadow-sm">
                <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest italic">Entrada de Datos Biométricos</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="num_input" placeholder="Nº ANIMAL" class="p-4 bg-white border border-slate-200 rounded-xl font-black text-2xl text-center outline-none focus:ring-2 ring-amber-500">
                    <input type="time" id="hor_input" class="p-4 bg-white border border-slate-200 rounded-xl font-bold text-center outline-none">
                    <button onclick="registrarEnGBI()" class="btn-gold rounded-xl font-black uppercase text-[10px] tracking-widest shadow-lg">Cargar en Matriz</button>
                </div>
            </section>

            <section class="glass-panel rounded-3xl overflow-hidden shadow-sm">
                <div class="bg-slate-50 p-4 border-b border-slate-200 flex justify-between items-center">
                    <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest italic">Matriz de Sucesión Algorítmica</h3>
                    <span class="text-[9px] bg-amber-100 text-amber-800 px-2 py-1 rounded font-bold uppercase">Automático Activo</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-100/50 text-[9px] text-slate-400 uppercase font-black">
                            <tr>
                                <th class="p-4">Hora/Turno</th>
                                <th class="p-4">Animal</th>
                                <th class="p-4">Familia/Raza</th>
                                <th class="p-4">Latencia</th>
                                <th class="p-4">Status</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-gbi" class="text-xs font-bold text-slate-600">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
