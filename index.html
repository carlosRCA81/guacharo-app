<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guácharo Algorithm Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-4 font-sans">
    <h1 class="text-2xl font-black text-center mb-6 text-yellow-500 tracking-tighter">GUÁCHARO ALGORITHM 🦜</h1>

    <div class="bg-slate-900 p-5 rounded-2xl shadow-2xl mb-8 border border-slate-800">
        <div class="flex justify-between items-center mb-4">
            <span class="text-[10px] font-bold text-slate-500 uppercase">Estado: <span class="text-green-500">Analizando</span></span>
            <div id="reloj-digital" class="text-yellow-500 font-mono font-bold text-xl">00:00:00</div>
        </div>

        <div class="space-y-4">
            <input type="text" id="animalito" placeholder="Número o Animalito" class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 text-white font-bold text-lg text-center focus:ring-2 focus:ring-yellow-500 outline-none">
            
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-slate-800 p-3 rounded-xl border border-slate-700 text-center">
                    <span class="block text-[9px] text-slate-500 uppercase font-black">Sorteo Detectado</span>
                    <span id="sorteo-proximo" class="text-sm font-bold text-white">--:--</span>
                </div>
                <input type="date" id="fecha_manual" class="bg-slate-800 p-3 rounded-xl border border-slate-700 text-white text-xs font-bold text-center">
            </div>

            <button onclick="registrarSorteo()" class="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-black py-4 rounded-xl shadow-[0_0_20px_rgba(202,138,4,0.3)] transition-all active:scale-95 uppercase">
                📥 Registrar en Base de Datos
            </button>
        </div>
    </div>

    <div id="contenedor-lista" class="space-y-3">
        <div class="flex justify-between items-center px-1">
            <h3 class="text-yellow-500 font-black text-xs uppercase tracking-widest">Secuencia del Día</h3>
            <span class="text-slate-500 text-[10px]">Límite: 12 Sorteos</span>
        </div>
        <div id="lista-resultados">
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
