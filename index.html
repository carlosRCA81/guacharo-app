<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador CRCA - Inteligencia Superior</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos nuevos para fluidez y resaltado */
        .panel-diario { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 15px; background: #0f172a; padding: 10px; border-radius: 8px; font-size: 0.7rem;}
        .hora-box { background: #334155; padding: 8px; text-align: center; border-radius: 4px; border: 1px solid #475569; color: #f8fafc;}
        .hora-box.jugado { background: #22c55e !important; color: #0f172a; font-weight: bold;}
        .75-especial { background: #fbbf24 !important; color: #000 !important; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .prediccion-card { background: #1e293b; border: 2px solid #38bdf8; border-radius: 12px; padding: 15px; margin-top: 10px; text-align: center; }
        .num-ia { font-size: 2rem; color: #fbbf24; font-weight: bold; display: block; }
    </style>
</head>
<body>
    <div id="main-app">
        <h1>ANALIZADOR CRCA</h1>
        <div id="live-clock">00:00:00</div>

        <div class="tab-container">
            <button class="tab-btn active" onclick="showTab('registro')">REGISTRO</button>
            <button class="tab-btn" onclick="showTab('ia')">PROYECCIÓN IA</button>
            <button class="tab-btn" onclick="showTab('estudio')">ESTUDIO 75</button>
            <button class="tab-btn" onclick="showTab('historial')">HISTORIAL</button>
        </div>

        <section id="registro" class="tab-content active">
            <div class="panel-diario" id="grid-horas"></div>
            <div class="entrada-rapida-container">
                <input type="number" id="num-rapido" placeholder="Nro">
                <button onclick="guardarRapido()">OK</button>
            </div>
            <div class="display-reciente">
                <span>Último: <strong id="txt-ultimo">--</strong></span>
                <button class="btn-danger" onclick="borrarUltimo()">BORRAR</button>
            </div>
            <div class="grid-animales" id="grid-botones-animales"></div>
        </section>

        <section id="ia" class="tab-content">
            <h3>ORÁCULO DE PREDICCIÓN</h3>
            <div id="panel-ia-resultados">
                <div class="prediccion-card">
                    <p>PRÓXIMOS MÁS PROBABLES</p>
                    <div id="top-3-ia" style="display: flex; justify-content: space-around;">
                        </div>
                </div>
                <div class="card-stats" style="margin-top:15px;">
                    <p>Estado del Mercado: <span id="ia-status" style="color:#22c55e;">Calculando...</span></p>
                    <p id="ia-razon" style="font-size:0.8rem; font-style:italic;"></p>
                </div>
            </div>
        </section>

        <section id="estudio" class="tab-content">
            <h3>CICLOS DEL GUACHARO (75)</h3>
            <div class="card-stats">
                <p>Ausencia Actual: <span id="dias-sin-75" style="font-size: 1.5rem; color:#fbbf24;">0</span> días</p>
                <p>Promedio de Salida: <span id="promedio-75">--</span></p>
            </div>
            <div id="ciclos-historicos" style="margin-top:10px; font-size:0.8rem;"></div>
        </section>

        <section id="historial" class="tab-content">
            <h3>DATOS ACUMULADOS</h3>
            <div style="margin-bottom: 10px;">
                <select id="filtro-mes" onchange="renderizarHistorial()" style="padding: 8px;">
                    <option value="todos">Ver Todo el Año</option>
                    <option value="01">Enero</option>
                    <option value="02">Febrero</option>
                    <option value="03">Marzo</option>
                    <option value="04">Abril</option>
                </select>
            </div>
            <div class="tabla-contenedor">
                <table id="tabla-registros">
                    <thead>
                        <tr><th>Fecha</th><th>Hora</th><th>Nro</th><th>Animal</th></tr>
                    </thead>
                    <tbody id="lista-historial"></tbody>
                </table>
            </div>
        </section>
    </div>
    <script src="logic.js"></script>
</body>
</html>
