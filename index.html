<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANALIZADOR CRCA PRO</title>
    <style>
        :root { --bg-dark: #111827; --card-bg: #1f2937; --accent: #3b82f6; --text: #f3f4f6; }
        body { background-color: var(--bg-dark); color: var(--text); font-family: sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        #main-app { width: 100%; max-width: 450px; background: var(--card-bg); border-radius: 15px; padding: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: #60a5fa; font-size: 1.4rem; margin: 0; }
        #live-clock { color: #fbbf24; font-size: 1.2rem; font-weight: bold; margin-top: 10px; }
        
        .tab-container { display: flex; gap: 5px; margin-top: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 5px; background: #374151; color: white; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .tab-btn.active { background: var(--accent); }

        .panel-diario { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin: 15px 0; background: #111827; padding: 10px; border-radius: 10px; }
        .hora-box { background: #374151; padding: 8px 4px; text-align: center; border-radius: 6px; border: 1px solid #4b5563; font-size: 0.65rem; cursor: pointer; min-height: 35px; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .hora-box.jugado { background: #10b981; color: #064e3b; font-weight: bold; border-color: #34d399; }
        .hora-box.active-select { border: 2px solid #60a5fa; background: #1e3a8a; }

        .panel-sniper { border: 2px solid #ef4444; border-radius: 12px; padding: 15px; text-align: center; margin-bottom: 15px; }
        .sniper-badge { background: #ef4444; color: white; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .sniper-nums { display: flex; justify-content: center; gap: 10px; margin-top: 10px; font-size: 1.5rem; font-weight: bold; }

        .grid-animales { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 15px; height: 250px; overflow-y: auto; padding-right: 5px; }
        .animal-btn { background: #374151; padding: 8px; text-align: center; border-radius: 6px; font-size: 0.65rem; border: 1px solid #4b5563; cursor: pointer; }
        
        .btn-anotar { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 1rem; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="main-app">
        <header>
            <h1>ANALIZADOR CRCA PRO</h1>
            <div style="font-size: 0.6rem; color: #10b981; margin-top: 2px;">LOTTO ACTIVO</div>
            <div id="live-clock">00:00:00</div>
            <div class="tab-container">
                <button class="tab-btn active" onclick="openTab(event, 'registro')">REGISTRO</button>
                <button class="tab-btn" onclick="openTab(event, 'algoritmo')">ALGORITMO</button>
                <button class="tab-btn" onclick="openTab(event, 'historial')">HISTORIAL</button>
            </div>
        </header>

        <section id="registro" class="tab-content">
            <div class="panel-sniper">
                <span class="sniper-badge">Próxima Jugada Calculada</span>
                <div class="sniper-nums" id="sniper-display">INGRESANDO DATOS...</div>
            </div>

            <div class="panel-diario" id="panel-horas"></div>

            <div style="display: flex; gap: 10px;">
                <input type="text" id="input-num" placeholder="00" style="width: 60px; text-align: center; border-radius: 8px; border: none; background: #374151; color: white; font-weight: bold;">
                <button class="btn-anotar" onclick="registrarPorInput()">ANOTAR RESULTADO</button>
            </div>

            <div class="grid-animales" id="grid-animales"></div>
            
            <input type="date" id="fecha-app" style="width: 100%; margin-top: 15px; padding: 10px; border-radius: 8px; background: #374151; color: white; border: none;">
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // CONFIGURACIÓN DE CONEXIÓN
        const S_URL = 'https://yhhiohwoutkmzkcengev.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InloaGlvaHdvdXRrbXprY2VuZ2V2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NDA2MDYsImV4cCI6MjA5MTQxNjYwNn0.FvoJcNPor5sicHLpRot_8DCGCd4ifx54JrxrcMrTTBc';
        const _supabase = supabase.createClient(S_URL, S_KEY);

        // HORARIO COMPLETO LOTTO ACTIVO (CORREGIDO)
        const HORAS = ['8:00 AM', '9:00 AM', '10:00 AM', '11:00 AM', '12:00 PM', '1:00 PM', '2:00 PM', '3:00 PM', '4:00 PM', '5:00 PM', '6:00 PM', '7:00 PM'];
        
        const ANIMALES = [
            {n:'0', a:'DELFIN'}, {n:'00', a:'BALLENA'}, {n:'01', a:'CARNERO'}, {n:'02', a:'TORO'},
            {n:'03', a:'CIEMPIES'}, {n:'04', a:'ALACRAN'}, {n:'05', a:'LEON'}, {n:'06', a:'RANA'},
            {n:'07', a:'PERICO'}, {n:'08', a:'RATON'}, {n:'09', a:'AGUILA'}, {n:'10', a:'TIGRE'},
            {n:'11', a:'GATO'}, {n:'12', a:'CABALLO'}, {n:'13', a:'MONO'}, {n:'14', a:'PALOMA'},
            {n:'15', a:'ZORRO'}, {n:'16', a:'OSO'}, {n:'17', a:'PAVO'}, {n:'18', a:'BURRO'},
            {n:'19', a:'CHIVO'}, {n:'20', a:'COCHINO'}, {n:'21', a:'GALLO'}, {n:'22', a:'CAMELLO'},
            {n:'23', a:'CEBRA'}, {n:'24', a:'IGUANA'}, {n:'25', a:'GALLINA'}, {n:'26', a:'VACA'},
            {n:'27', a:'PERRO'}, {n:'28', a:'ZAMURO'}, {n:'29', a:'ELEFANTE'}, {n:'30', a:'CAIMAN'},
            {n:'31', a:'LAPA'}, {n:'32', a:'ARDILLA'}, {n:'33', a:'PESCADO'}, {n:'34', a:'VENADO'},
            {n:'35', a:'JIRAFA'}, {n:'36', a:'CULEBRA'}
        ];

        let db_local = [];
        let hora_actual = null;

        async function iniciar() {
            document.getElementById('fecha-app').value = new Date().toISOString().split('T')[0];
            renderHoras();
            renderGrid();
            await fetchDB();
            actualizarReloj();
        }

        async function fetchDB() {
            const { data } = await _supabase.from('historial_sorteos').select('*');
            if(data) { db_local = data; refreshUI(); }
        }

        function renderHoras() {
            const cont = document.getElementById('panel-horas');
            const fecha = document.getElementById('fecha-app').value;
            cont.innerHTML = '';
            HORAS.forEach(h => {
                const res = db_local.find(r => r.fecha === fecha && r.hora === h);
                const div = document.createElement('div');
                div.className = `hora-box ${res ? 'jugado' : ''} ${h === hora_actual ? 'active-select' : ''}`;
                div.innerHTML = `<span>${h}</span>${res ? `<b>${res.num}</b>` : ''}`;
                div.onclick = () => { hora_actual = h; renderHoras(); };
                cont.appendChild(div);
            });
        }

        function renderGrid() {
            const cont = document.getElementById('grid-animales');
            ANIMALES.forEach(ani => {
                const div = document.createElement('div');
                div.className = 'animal-btn';
                div.innerHTML = `<b>${ani.n}</b><br>${ani.a}`;
                div.onclick = () => registrar(ani.n, ani.a);
                cont.appendChild(div);
            });
        }

        async function registrar(n, a) {
            if(!hora_actual) return alert("Selecciona una hora arriba");
            const registro = { 
                fecha: document.getElementById('fecha-app').value, 
                hora: hora_actual, 
                num: n.toString(), 
                animal: a 
            };
            
            const idx = db_local.findIndex(r => r.fecha === registro.fecha && r.hora === registro.hora);
            if(idx !== -1) db_local[idx] = registro; else db_local.push(registro);
            
            refreshUI();
            await _supabase.from('historial_sorteos').upsert(registro);
        }

        function registrarPorInput() {
            const val = document.getElementById('input-num').value;
            const ani = ANIMALES.find(x => x.n === val || x.n === val.padStart(2, '0'));
            if(ani) registrar(ani.n, ani.a);
            document.getElementById('input-num').value = '';
        }

        function refreshUI() {
            renderHoras();
            // Lógica simple de predicción
            const display = document.getElementById('sniper-display');
            const hoy = db_local.filter(r => r.fecha === document.getElementById('fecha-app').value);
            if(hoy.length > 0) {
                const ultimo = parseInt(hoy[hoy.length-1].num);
                display.innerHTML = `<span style="background:#111827; padding:5px 15px; border-radius:5px;">${(ultimo+1)%37}</span> <span style="background:#111827; padding:5px 15px; border-radius:5px;">11</span>`;
            }
        }

        function actualizarReloj() {
            setInterval(() => {
                document.getElementById('live-clock').innerText = new Date().toLocaleTimeString();
            }, 1000);
        }

        function openTab(evt, name) {
            console.log("Cambiando a " + name);
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            evt.currentTarget.classList.add('active');
        }

        window.onload = iniciar;
    </script>
</body>
</html>
