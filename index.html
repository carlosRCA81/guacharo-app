<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador CRCA Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen">
        <h2>SISTEMA CRCA</h2>
        <input type="password" id="access-key" placeholder="Clave">
        <button onclick="checkAccess()">ENTRAR</button>
    </div>

    <div id="main-app" style="display: none;">
        <header>
            <h1>ANALIZADOR CRCA</h1>
            <div id="live-clock">00:00:00</div>
            <div class="tab-container">
                <button class="tab-btn active" onclick="openTab(event, 'registro')">REGISTRO</button>
                <button class="tab-btn" onclick="openTab(event, 'estudio')">ESTUDIO 75</button>
                <button class="tab-btn" onclick="openTab(event, 'historial')">HISTORIAL</button>
            </div>
        </header>

        <section id="registro" class="tab-content active">
            <div class="panel-diario" id="panel-diario-sorteos" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px;"></div>
            <div class="controls-row">
                <input type="date" id="fecha-analisis">
            </div>
            <div class="entrada-rapida-container" style="display: flex; gap: 10px; margin: 10px 0;">
                <input type="text" id="num-rapido" maxlength="2" placeholder="Nro">
                <button onclick="registrarPorNumero()">OK</button>
            </div>
            <p>Último: <span id="last-num">--</span></p>
            <div class="grid-animales" id="grid-container"></div>
        </section>

        <section id="estudio" class="tab-content">
            <div class="card-stats">
                <h3>GUACHARO (75)</h3>
                <p>Días sin salir: <span id="dias-sin-75">0</span></p>
                <div id="balance-elementos">
                    🌬️ Aire: <span id="val-aire">0</span> | 🌱 Tierra: <span id="val-tierra">0</span> | 💧 Agua: <span id="val-agua">0</span>
                </div>
                <p>⚠️ Dormidos: <span id="lista-dormidos">...</span></p>
            </div>
        </section>

        <section id="historial" class="tab-content">
            <table>
                <thead>
                    <tr><th>Fecha</th><th>Hora</th><th>Nro</th><th>Animal</th><th>Tipo</th></tr>
                </thead>
                <tbody id="lista-historial"></tbody>
            </table>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="security.js"></script>
    <script src="logic.js"></script>
</body>
</html>
