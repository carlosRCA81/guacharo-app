<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador CRCA - Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body onload="verificarAcceso()">
    <div class="top-bar">🛰️ SISTEMA DE INTELIGENCIA CRCA v2.0</div>
    
    <div class="container">
        <div class="panel-registro">
            <h2>📥 Cargar Sorteo</h2>
            <input type="date" id="fecha" value="2026-04-09">
            <select id="hora">
                <option value="08:00">08:00 AM</option>
                <option value="12:00">12:00 PM</option>
                <option value="19:00">07:00 PM</option>
            </select>
            <input type="text" id="num" placeholder="Número (00-75)">
            <button class="btn-main" onclick="guardarDato()">INCROSTAR EN CEREBRO</button>
        </div>

        <div class="panel-stats">
            <div class="card alert-75">
                <h3>🎯 Alerta Guácharo (75)</h3>
                <div id="count-75" class="big-num">0</div>
                <p>Veces detectado</p>
            </div>
            
            <div class="card">
                <h3>🔥 Probabilidades del 70%</h3>
                <div id="top-probables">Analizando patrones...</div>
            </div>
        </div>

        <div class="panel-historial">
            <h3>📜 Últimos Movimientos</h3>
            <div id="lista-historial"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
