<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador CRCA PRO</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 400px; background: var(--card); border-radius: 12px; padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        header { text-align: center; margin-bottom: 15px; }
        .clock { color: #fbbf24; font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 6px; background: #334155; color: white; cursor: pointer; font-weight: bold; font-size: 0.7rem; }
        .tab-btn.active { background: var(--accent); color: #0f172a; }

        /* REGISTRO */
        .status-box { border: 2px solid #ef4444; border-radius: 8px; padding: 10px; text-align: center; margin-bottom: 15px; }
        .grid-horas { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 15px; }
        .hora-item { background: #334155; padding: 8px 2px; text-align: center; border-radius: 4px; font-size: 0.65rem; cursor: pointer; border: 1px solid transparent; }
        .hora-item.selected { border-color: var(--accent); background: #0f172a; }
        .hora-item.has-data { background: #22c55e; color: #0f172a; font-weight: bold; }

        .animal-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; height: 180px; overflow-y: auto; background: #0f172a; padding: 8px; border-radius: 8px; }
        .animal-btn { background: #334155; padding: 10px 5px; text-align: center; border-radius: 4px; font-size: 0.6rem; cursor: pointer; border: 1px solid #475569; }

        .date-picker { width: 100%; padding: 10px; margin-top: 10px; background: #334155; border: none; color: white; border-radius: 5px; }

        /* TABLA HISTORIAL LIMPIA */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.8rem; }
        th { color: var(--accent); border-bottom: 1px solid #334155; padding: 8px; text-align: center; }
        td { padding: 8px; border-bottom: 1px solid #334155; text-align: center; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div id="clock" class="clock">00:00:00</div>
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('registro')">REGISTRO</button>
            <button class="tab-btn" onclick="showTab('algoritmo')">ALGORITMO</button>
            <button class="tab-btn" onclick="showTab('historial')">HISTORIAL</button>
        </div>
    </header>

    <section id="registro" class="content">
        <div class="status-box">
            <span style="font-size: 0.6rem; font-weight: bold; color: #ef4444;">PRÓXIMA JUGADA CALCULADA</span>
            <div style="font-size: 0.9rem; margin-top: 5px;">DATOS DE ENERO...</div>
        </div>
        <div class="grid-horas" id="grid-horas"></div>
        <div class="animal-grid" id="animal-grid"></div>
        <input type="date" id="main-date" class="date-picker" onchange="refreshAll()">
    </section>

    <section id="algoritmo" class="content" style="display:none;">
        <h3 style="text-align:center; color:var(--accent); font-size:0.9rem;">ESTUDIO DE PATRONES ACTIVADO</h3>
        <div style="background:#0f172a; padding:20px; border-radius:8px; text-align:center; color:#94a3b8; font-size: 0.8rem;">
            Analizando secuencias de sorteos anteriores...
        </div>
    </section>

    <section id="historial" class="content" style="display:none;">
        <table>
            <thead>
                <tr><th>HORA</th><th>N°</th><th>ANIMAL</th></tr>
            </thead>
            <tbody id="historial-body"></tbody>
        </table>
    </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const S_URL = 'https://yhhiohwoutkmzkcengev.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InloaGlvaHdvdXRrbXprY2VuZ2V2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NDA2MDYsImV4cCI6MjA5MTQxNjYwNn0.FvoJcNPor5sicHLpRot_8DCGCd4ifx54JrxrcMrTTBc';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    const HORAS = ["8:00 AM", "9:00 AM", "10:00 AM", "11:00 AM", "12:00 PM", "1:00 PM", "2:00 PM", "3:00 PM", "4:00 PM", "5:00 PM", "6:00 PM", "7:00 PM"];
    const ANIMALES = [{n:'0',a:'DELFIN'},{n:'00',a:'BALLENA'},{n:'01',a:'CARNERO'},{n:'02',a:'TORO'},{n:'03',a:'CIEMPIES'},{n:'04',a:'ALACRAN'},{n:'05',a:'LEON'},{n:'06',a:'RANA'},{n:'07',a:'PERICO'},{n:'08',a:'RATON'},{n:'09',a:'AGUILA'},{n:'10',a:'TIGRE'},{n:'11',a:'GATO'},{n:'12',a:'CABALLO'},{n:'13',a:'MONO'},{n:'14',a:'PALOMA'},{n:'15',a:'ZORRO'},{n:'16',a:'OSO'},{n:'17',a:'PAVO'},{n:'18',a:'BURRO'},{n:'19',a:'CHIVO'},{n:'20',a:'COCHINO'},{n:'21',a:'GALLO'},{n:'22',a:'CAMELLO'},{n:'23',a:'CEBRA'},{n:'24',a:'IGUANA'},{n:'25',a:'GALLINA'},{n:'26',a:'VACA'},{n:'27',a:'PERRO'},{n:'28',a:'ZAMURO'},{n:'29',a:'ELEFANTE'},{n:'30',a:'CAIMAN'},{n:'31',a:'LAPA'},{n:'32',a:'ARDILLA'},{n:'33',a:'PESCADO'},{n:'34',a:'VENADO'},{n:'35',a:'JIRAFA'},{n:'36',a:'CULEBRA'}];

    let selectedHora = null;
    let dataMemoria = [];

    function showTab(tabId) {
        document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).style.display = 'block';
        event.currentTarget.classList.add('active');
    }

    async function refreshAll() {
        const { data } = await _supabase.from('historial_sorteos').select('*');
        dataMemoria = data || [];
        renderHoras();
        renderHistorial();
    }

    function renderHoras() {
        const grid = document.getElementById('grid-horas');
        const fecha = document.getElementById('main-date').value;
        grid.innerHTML = '';
        HORAS.forEach(h => {
            const res = dataMemoria.find(d => d.fecha === fecha && d.hora === h);
            const div = document.createElement('div');
            div.className = `hora-item ${res ? 'has-data' : ''} ${selectedHora === h ? 'selected' : ''}`;
            div.innerHTML = `${h}${res ? `<br>${res.num}` : ''}`;
            div.onclick = () => { selectedHora = h; renderHoras(); };
            grid.appendChild(div);
        });
    }

    function renderAnimales() {
        const grid = document.getElementById('animal-grid');
        ANIMALES.forEach(ani => {
            const div = document.createElement('div');
            div.className = 'animal-btn';
            div.innerHTML = `<strong>${ani.n}</strong><br>${ani.a}`;
            div.onclick = () => guardar(ani.n, ani.a);
            grid.appendChild(div);
        });
    }

    async function guardar(n, a) {
        if (!selectedHora) return alert("Selecciona una hora primero");
        const entry = { fecha: document.getElementById('main-date').value, hora: selectedHora, num: n, animal: a };
        await _supabase.from('historial_sorteos').upsert(entry);
        refreshAll();
    }

    function renderHistorial() {
        const body = document.getElementById('historial-body');
        const fecha = document.getElementById('main-date').value;
        body.innerHTML = '';
        const hoy = dataMemoria.filter(d => d.fecha === fecha).sort((a,b) => HORAS.indexOf(a.hora) - HORAS.indexOf(b.hora));
        hoy.forEach(r => {
            body.innerHTML += `<tr><td>${r.hora}</td><td><b>${r.num}</b></td><td>${r.animal}</td></tr>`;
        });
    }

    window.onload = () => {
        document.getElementById('main-date').value = new Date().toISOString().split('T')[0];
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        renderAnimales();
        refreshAll();
    };
</script>
</body>
</html>
