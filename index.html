<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Análisis - Sorteos en Vivo</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-client@2"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Sistema de Análisis de Sorteos</h1>
            <p>Monitoreo en vivo y estudio del Número Especial (75)</p>
        </header>

        <main>
            <section class="filtro-seccion">
                <div class="card">
                    <h3>Selección de Fecha</h3>
                    <div class="controles">
                        <input type="date" id="fecha-sorteo" class="input-fecha">
                        <button id="btn-consultar" class="btn-ejecutar">Consultar y Analizar</button>
                    </div>
                </div>
            </section>

            <section class="resultados-seccion">
                <div id="pantalla-datos">
                    <div class="mensaje-bienvenida">
                        Seleccione una fecha en el almanaque para ver los resultados ordenados.
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
