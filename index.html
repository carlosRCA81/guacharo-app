<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBI-SCANNER | Intelligence System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; color: #0f172a; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .blueprint-grid { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 30px 30px; }
        .glass-panel { background: white; border: 2.5px solid #1e293b; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .input-pro { border: 2.5px solid #334155; color: #000; font-weight: 900; background: #fff; }
        .input-pro:focus { border-color: #b45309; outline: none; }
        .hidden { display: none; }
    </style>
</head>
<body class="blueprint-grid min-h-screen">

    <div id="lock-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-100">
        <div class="glass-panel p-10 rounded-3xl text-center max-w-sm w-full mx-4">
            <div class="text-4xl mb-4">🦅</div>
            <h2 class="text-[10px] font-black uppercase tracking-[0.4em] text-amber-700 mb-6">GBI System Access</h2>
            <input type="password" id="access_key" placeholder="TOKEN" class="w-full input-pro p-4 rounded-xl text-center mb-4 text-2xl">
            <button onclick="validarAcceso()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-amber-700 transition-all">Desbloquear Matriz</button>
        </div>
    </div>

    <div id="main-system" class="hidden">
        <nav class="bg-white border-b-4 border-slate-900 p-4 flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <span class="bg-amber-600 text-white px-3 py-1 rounded font-black text-xl italic shadow-md">GBI</span>
                <span class="text-[10px] font-bold text-slate-600 uppercase tracking-tighter">Biometric Intelligence<br>v2.0 Production</span>
            </div>
            <div id="reloj_pro" class="text-xl font-mono font-black text-slate-800">00:00:00</div>
        </nav>

        <main class="p-4 max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-1">
                <section class="glass-panel p-6 rounded-3xl sticky top-24">
                    <h3 class="text-[10px] font-black text-amber-700 uppercase mb-4 tracking-widest underline decoration-2">Registro de Sorteo</h3>
                    <div class="space-y-4">
                        <label class="text-[9px] font-black text-slate-400 uppercase">Número Animal</label>
                        <input type="text" id="num_input" placeholder="0 - 75" class="w-full input-pro p-6 rounded-2xl text-6xl text-center">
                        
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="text-[9px] font-black text-slate-400 uppercase">Fecha</label>
                                <input type="date" id="fec_input" class="w-full input-pro p-3 rounded-xl text-[10px] text-center">
                            </div>
                            <div>
                                <label class="text-[9px] font-black text-slate-400 uppercase">Horario</label>
                                <select id="hor_input" class="w-full input-pro p-3 rounded-xl text-xs bg-white cursor-pointer">
                                    <option value="08:00">08:00 AM</option><option value="09:00">09:00 AM</option>
                                    <option value="10:00">10:00 AM</option><option value="11:00">11:00 AM</option>
                                    <option value="12:00">12:00 PM</option><option value="13:00">01:00 PM</option>
                                    <option value="16:00">04:00 PM</option><option value="19:00">07:00 PM</option>
                                </select>
                            </div>
                        </div>
                        <button onclick="registrarEnGBI()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase text-xs shadow-lg hover:bg-amber-700 active:scale-95 transition-all">Procesar y Guardar</button>
                    </div>
                </section>
            </div>

            <div class="lg:col-span-2">
                <section class="glass-panel rounded-3xl overflow-hidden min-h-[600px]">
                    <div class="bg-slate-900 p-4 flex justify-between items-center text-white">
                        <h3 class="text-[9px] font-black uppercase tracking-[0.2em] italic">Sucesión de Resultados 2026</h3>
                        <span class="text-[9px] bg-green-500 text-slate-900 px-2 py-1 rounded font-bold">IA ONLINE</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-slate-100 text-[10px] text-slate-600 font-black uppercase border-b-2 border-slate-200">
                                <tr>
                                    <th class="p-4 text-left">Hora</th>
                                    <th class="p-4 text-left">Animal / ADN</th>
                                    <th class="p-4 text-center text-slate-400">Familia</th>
                                    <th class="p-4 text-center">Precisión</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-gbi" class="font-bold text-sm">
                                </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
