<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador CRCA - Inteligencia Guácharo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0a0f1d; color: #cbd5e1; font-family: sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-tab { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        input, select { background: #161e31 !important; border: 1px solid #1e293b !important; color: white !important; }
    </style>
</head>
<body class="pb-20">

    <header class="p-4 bg-slate-900 border-b border-slate-800 text-center sticky top-0 z-50">
        <h1 class="text-blue-500 font-black tracking-tighter text-xl">ANALIZADOR CRCA</h1>
        <p class="text-[9px] text-slate-500 font-bold">ESTUDIO DE ALGORITMOS - GUÁCHARO ACTIVO</p>
    </header>

    <main class="p-4 max-w-md mx-auto">
        
        <section id="anotar" class="tab-content active space-y-4">
            <div class="p-4 bg-slate-900/50 rounded-xl border border-slate-800">
                <label class="text-[10px] font-bold text-slate-500 uppercase">Fecha de Estudio</label>
                <input type="date" id="fecha_registro" class="w-full p-3 rounded-lg mt-1 font-bold text-yellow-500">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="p-4 bg-slate-900/50 rounded-xl border border-slate-800">
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Sorteo</label>
                    <select id="hora" class="w-full p-3 rounded-lg mt-1 font-bold">
                        <option value="08:00">08:00 AM</option>
                        <option value="09:00">09:00 AM</option>
                        <option value="10:00">10:00 AM</option>
                        <option value="11:00">11:00 AM</option>
                        <option value="12:00">12:00 PM</option>
                        <option value="13:00">01:00 PM</option>
                        <option value="14:00">02:00 PM</option>
                        <option value="15:00">03:00 PM</option>
                        <option value="16:00">04:00 PM</option>
                        <option value="17:00">05:00 PM</option>
                        <option value="18:00">06:00 PM</option>
                        <option value="19:00">07:00 PM</option>
                    </select>
                </div>
                <div class="p-4 bg-slate-900/50 rounded-xl border border-slate-800">
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Número</label>
                    <input type="text" id="numero" placeholder="00-75" class="w-full p-3 rounded-lg mt-1 text-center font-black text-xl">
                </div>
            </div>

            <button onclick="guardarDato()" class="w-full bg-green-600 hover:bg-green-500 p-4 rounded-xl font-black text-white shadow-lg uppercase tracking-widest">Anotar Movimiento</button>
        </section>

        <section id="estudio" class="tab-content space-y-4">
            <div class="bg-blue-950/20 border border-blue-900 p-4 rounded-xl">
                <h3 class="text-blue-400 font-bold text-xs uppercase mb-2">Análisis de Salida</h3>
                <div id="analisis-movimiento" class="text-[11px] space-y-1 text-slate-400">
                    Cargando patrones detectados...
                </div>
            </div>
            <div class="bg-slate-900/50 rounded-xl border border-slate-800 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-800 text-[10px] uppercase text-slate-400">
                        <tr><th class="p-3">Hora</th><th class="p-3">N°</th><th class="p-3">Animal</th></tr>
                    </thead>
                    <tbody id="lista-historial" class="text-sm"></tbody>
                </table>
            </div>
        </section>

        <section id="radar" class="tab-content space-y-4">
            <div class="p-6 border-2 border-dashed border-yellow-600/30 rounded-2xl text-center bg-yellow-900/10">
                <h2 class="text-yellow-500 font-black text-2xl">OBJETIVO 75</h2>
                <p class="text-[10px] text-yellow-600 uppercase font-bold tracking-widest">Estudio de Máxima Ganancia</p>
            </div>
            <div id="estudio-75" class="bg-slate-900 p-4 rounded-xl border border-slate-800 space-y-4">
                </div>
        </section>

    </main>

    <nav class="fixed bottom-0 w-full bg-slate-900 border-t border-slate-800 flex justify-around p-2 text-[10px] font-bold uppercase">
        <button onclick="switchTab('anotar')" class="flex flex-col items-center p-2 active-tab tab-btn" id="btn-anotar">
            <i class="fas fa-edit text-lg mb-1"></i>Anotar
        </button>
        <button onclick="switchTab('estudio')" class="flex flex-col items-center p-2 tab-btn" id="btn-estudio">
            <i class="fas fa-microscope text-lg mb-1"></i>Estudio
        </button>
        <button onclick="switchTab('radar')" class="flex flex-col items-center p-2 tab-btn" id="btn-radar">
            <i class="fas fa-crosshairs text-lg mb-1"></i>Radar 75
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
