<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRCA ELITE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header style="text-align: center; margin-bottom: 10px;">
        <h2 style="color: var(--blue); margin: 5px;">ANALIZADOR CRCA</h2>
        <div id="clock" style="color: #fbbf24; font-size: 1.2rem; font-weight: bold;">00:00:00</div>
    </header>

    <div class="tab-container">
        <button class="tab-btn active" onclick="openTab(event, 'reg')">REGISTRO</button>
        <button class="tab-btn" onclick="openTab(event, 'est')">ESTUDIO 75</button>
        <button class="tab-btn" onclick="openTab(event, 'hist')">HISTORIAL</button>
    </div>

    <div id="reg" class="tab-content">
        <div class="panel-diario" id="hora-panel"></div>
        <input type="date" id="fecha-reg" class="input-full" onchange="renderHoras()">
        <div class="grid-animales" id="animal-grid"></div>
    </div>

    <div id="est" class="tab-content" style="display: none; text-align: center;">
        <div style="background: var(--card); padding: 20px; border-radius: 10px;">
            <h3>AUSENCIA GUACHARO</h3>
            <div id="stat-75" style="font-size: 3rem; color: var(--green); font-weight: bold;">0</div>
            <p>Sorteos sin salir</p>
        </div>
    </div>

    <div id="hist" class="tab-content" style="display: none;">
        <input type="date" id="fecha-hist" class="input-full">
        <button class="btn-ok" onclick="filterHist()">ACEPTAR / VER FECHA</button>
        <div class="tabla-scroll" style="margin-top: 15px;">
            <table>
                <thead>
                    <tr><th>Fecha</th><th>Hora</th><th>Nro</th><th>Animal</th><th>Tipo</th></tr>
                </thead>
                <tbody id="hist-body"></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="logic.js"></script>
</body>
</html>
