<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA LARA PRO V3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="snd-alerta" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <div id="main-app">
        <header>
            <h1>SISTEMA <span style="color: #22c55e;">LARA</span> <small style="font-size:0.5rem; color:#fbbf24;">PRO</small></h1>
            <div id="live-clock">00:00:00</div>
            <div class="tab-container">
                <button class="tab-btn active" onclick="openTab(event, 'registro')">REGISTRO</button>
                <button class="tab-btn" onclick="openTab(event, 'sectores-tab')">SECTORES</button>
                <button class="tab-btn" onclick="openTab(event, 'tripletas-tab')">TRIPLETAS</button>
                <button class="tab-btn" onclick="openTab(event, 'estudio-avanzado')">ALGORITMO</button>
                <button class="tab-btn" onclick="openTab(event, 'historial')">HISTORIAL</button>
            </div>
        </header>

        <section id="registro" class="tab-content active">
            <div class="panel-sniper">
                <span class="sniper-badge">🎯 PRÓXIMA JUGADA</span>
                <div class="sniper-nums" id="numeros-sugeridos-directos">...</div>
                <div id="aviso-fuera" style="color: #fbbf24; font-size: 0.75rem; margin-top: 5px; font-weight: bold;"></div>
            </div>

            <div class="panel-diario" id="panel-diario-sorteos"></div>

            <div class="entrada-rapida">
                <input type="text" id="num-rapido" maxlength="2" placeholder="Nro">
                <button onclick="registrarPorNumero()">ANOTAR</button>
            </div>
            
            <div class="grid-animales" id="grid-container"></div>
            <input type="date" id="fecha-analisis" class="fecha-input">
        </section>

        <section id="sectores-tab" class="tab-content" style="display:none;">
            <div class="info-label">MAPA DE RULETA (SENSORES ACTIVOS)</div>
            <div id="mapa-ruleta" class="mapa-container"></div>
        </section>

        <section id="tripletas-tab" class="tab-content" style="display:none;">
            <div class="info-label">TRIPLETAS CALCULADAS (DEUDA Y CIERRE)</div>
            <div id="seccion-tripletas" class="tripleta-list"></div>
        </section>

        <section id="estudio-avanzado" class="tab-content" style="display:none;">
            <div class="radar-container">
                <h3>📡 RADAR DE ATRACCIÓN</h3>
                <select id="select-estudio-animal" onchange="estudiarAtraccion()"></select>
                <div id="resultado-atraccion"></div>
            </div>
        </section>

        <section id="historial" class="tab-content" style="display:none;">
            <div class="historial-header">
                <input type="date" id="fecha-busqueda-historial" onchange="actualizarTabla()" class="fecha-input">
            </div>
            <div class="tabla-contenedor">
                <table>
                    <thead>
                        <tr><th>HORA</th><th>NRO</th><th>ANIMAL</th><th>SEC</th><th>COLOR</th></tr>
                    </thead>
                    <tbody id="lista-historial"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="logic.js"></script>
</body>
</html>
