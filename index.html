<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-GATE NEXUS ANALYTICS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { border-bottom: 4px solid #ca8a04; color: #eab308; }
        .hidden { display: none; }
        .glow-text { text-shadow: 0 0 10px rgba(234, 179, 8, 0.4); }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans">
    <nav class="flex border-b border-slate-800 bg-slate-900 sticky top-0 z-50">
        <button onclick="cambiarPestana('registro')" id="tab-reg" class="flex-1 py-4 font-black text-[9px] uppercase text-slate-500 text-center">Registro</button>
        <button onclick="cambiarPestana('historial')" id="tab-his" class="flex-1 py-4 font-black text-[9px] uppercase text-slate-500 text-center">Historial</button>
        <button onclick="cambiarPestana('analisis')" id="tab-ana" class="flex-1 py-4 font-black text-[9px] uppercase text-slate-500 text-center italic">Inteligencia</button>
        <button onclick="cambiarPestana('semanal')" id="tab-sem" class="flex-1 py-4 font-black text-[9px] uppercase tab-active text-center">Estadística</button>
    </nav>

    <section id="vista-registro" class="p-4 hidden">
        <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 mb-6">
            <div class="flex justify-between items-center mb-4">
                <span id="reloj" class="text-yellow-500 font-mono font-bold text-xl">00:00:00</span>
                <span class="text-[8px] bg-blue-900/30 text-blue-400 px-2 py-1 rounded border border-blue-900 font-black italic">SCN-911 ACTIVO</span>
            </div>
            <input type="text" id="animalito" placeholder="Ingresar Número" class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 text-white font-black text-3xl text-center mb-4 outline-none focus:border-yellow-600">
            <div class="grid grid-cols-2 gap-2 mb-4">
                <input type="date" id="fecha_hoy" class="bg-slate-800 p-3 rounded-xl border border-slate-700 text-white text-[10px] font-bold text-center">
                <select id="hora_manual" class="bg-slate-800 p-3 rounded-xl border border-slate-700 text-white text-[10px] font-bold text-center">
                    <option value="08:00">08:00 AM</option><option value="12:00">12:00 PM</option><option value="16:00">04:00 PM</option><option value="19:00">07:00 PM</option>
                </select>
            </div>
            <button onclick="registrarSorteo()" class="w-full bg-yellow-600 text-white font-black py-4 rounded-xl shadow-lg uppercase text-xs">Cargar Reporte</button>
        </div>
        <div id="lista-hoy" class="space-y-2"></div>
    </section>

    <section id="vista-semanal" class="p-4">
        <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-2xl mb-4">
            <h3 class="text-yellow-500 font-black text-center text-xs uppercase italic mb-6">Patrones por Día de la Semana</h3>
            <div id="contenedor-semanal" class="space-y-4">
                </div>
        </div>
    </section>

    <section id="vista-historial" class="p-4 hidden"></section>
    <section id="vista-analisis" class="p-4 hidden"></section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
