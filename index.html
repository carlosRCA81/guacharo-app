<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRCA PRO V2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="snd-alerta" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <div id="main-app">
        <header>
            <h1>CRCA PRO <span style="color: #22c55e;">V2.0</span></h1>
            <div id="live-clock">00:00:00</div>
            <div class="tab-container">
                <button class="tab-btn active" onclick="openTab(event, 'registro')">REGISTRO</button>
                <button class="tab-btn" onclick="openTab(event, 'estudio-avanzado')">ALGORITMO</button>
                <button class="tab-btn" onclick="openTab(event, 'historial')">HISTORIAL</button>
            </div>
        </header>

        <section id="registro" class="tab-content active">
            <div class="panel-sniper" id="panel-proxima-jugada">
                <span style="font-size: 0.6rem; font-weight: bold;" id="sniper-titulo">🎯 PRÓXIMA JUGADA</span>
                <div class="sniper-nums" id="numeros-sugeridos-directos">...</div>
                <div id="aviso-tripleta" style="font-size: 0.7rem; margin-top: 5px;"></div>
            </div>

            <div id="seccion-tripletas" class="tripleta-container"></div>

            <div class="panel-diario" id="panel-diario-sorteos" style="display:grid; grid-template-columns: repeat(4, 1fr); gap:4px; margin-bottom:10px;"></div>

            <div style="display:flex; gap:5px; margin-bottom:10px;">
                <input type="text" id="num-rapido" maxlength="2" placeholder="Nro" style="width:50px; text-align:center;">
                <button onclick="registrarPorNumero()" style="flex:1;">REGISTRAR</button>
            </div>
            
            <div class="grid-animales" id="grid-container"></div>
            <input type="date" id="fecha-analisis" style="width:100%; margin-top:10px;">
        </section>

        <section id="estudio-avanzado" class="tab-content">
            <div style="background:#0f172a; padding:15px; border-radius:10px; border:1px solid #38bdf8;">
                <h3 style="text-align:center; color:#38bdf8;">📡 RADAR DE ATRACCIÓN</h3>
                <select id="select-estudio-animal" onchange="estudiarAtraccion()" style="width:100%; padding:10px;"></select>
                <div id="resultado-atraccion" style="text-align:center;"></div>
            </div>
        </section>

        <section id="historial" class="tab-content">
            <input type="date" id="fecha-busqueda-historial" onchange="actualizarTabla()" style="width:100%; margin-bottom:10px;">
            <div class="tabla-contenedor">
                <table>
                    <thead><tr><th>Hora</th><th>Nro</th><th>Animal</th><th>Sec</th><th>Col</th></tr></thead>
                    <tbody id="lista-historial"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="logic.js"></script>
</body>
</html>
