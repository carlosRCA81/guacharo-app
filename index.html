<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador CRCA - V-Gate Nexus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .bg-radar { background: rgba(245, 158, 11, 0.1); border: 1px solid #f59e0b; }
        .row-especial { background-color: rgba(245, 158, 11, 0.2); font-weight: bold; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

    <header class="bg-slate-800 p-4 border-b border-amber-600 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-amber-500">ANALIZADOR CRCA <span class="text-xs text-white block">Algoritmo Guácharo Activo</span></h1>
            <div class="text-right text-[10px]">
                <p>ADMIN: CARLOS CARVALLO</p>
                <p id="status" class="text-green-400">● SISTEMA ONLINE</p>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 space-y-6">

        <section class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-md">
            <h2 class="text-amber-500 font-bold mb-4">📥 REGISTRO DE SORTEO</h2>
            <form id="formCaptura" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <input type="date" id="fecha" required class="bg-slate-700 p-2 rounded border border-slate-600 outline-none">
                <select id="hora" required class="bg-slate-700 p-2 rounded border border-slate-600 outline-none">
                    <option value="08:00 AM">08:00 AM</option>
                    <option value="09:00 AM">09:00 AM</option>
                    <option value="10:00 AM">10:00 AM</option>
                    <option value="11:00 AM">11:00 AM</option>
                    <option value="12:00 PM">12:00 PM</option>
                    <option value="01:00 PM">01:00 PM</option>
                    <option value="04:00 PM">04:00 PM</option>
                    <option value="05:00 PM">05:00 PM</option>
                    <option value="06:00 PM">06:00 PM</option>
                    <option value="07:00 PM">07:00 PM</option>
                </select>
                <input type="number" id="numero" placeholder="Número" required class="bg-slate-700 p-2 rounded border border-slate-600 outline-none">
                <button type="submit" class="bg-amber-600 hover:bg-amber-500 text-white font-bold py-2 px-4 rounded transition">GUARDAR</button>
            </form>
        </section>

        <section class="bg-radar p-6 rounded-xl shadow-inner">
            <h2 class="text-amber-500 font-black text-center mb-4 italic">📡 RADAR GUÁCHARO (75)</h2>
            <div class="grid grid-cols-2 gap-4 text-center">
                <div class="bg-slate-900 p-4 rounded border border-amber-500/30">
                    <h3 class="text-xs text-slate-400 uppercase">Atracción (Antes)</h3>
                    <div id="antes75" class="text-xl font-mono text-amber-400">-</div>
                </div>
                <div class="bg-slate-900 p-4 rounded border border-amber-500/30">
                    <h3 class="text-xs text-slate-400 uppercase">Salida (Después)</h3>
                    <div id="despues75" class="text-xl font-mono text-amber-400">-</div>
                </div>
            </div>
        </section>

        <section class="bg-slate-800 rounded-xl overflow-hidden border border-slate-700">
            <h2 class="p-4 font-bold bg-slate-700/50">📊 ÚLTIMOS RESULTADOS</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-900 text-slate-400">
                        <tr>
                            <th class="p-3">FECHA</th>
                            <th class="p-3">HORA</th>
                            <th class="p-3">N°</th>
                            <th class="p-3">ANIMAL</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla" class="divide-y divide-slate-700">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        // 1. CONFIGURACIÓN (Pon tus datos aquí)
        const URL_SB = "TU_SUPABASE_URL"; 
        const KEY_SB = "TU_SUPABASE_ANON_KEY"; 
        const supabase = supabase.createClient(URL_SB, KEY_SB);

        // 2. DICCIONARIO DE ANIMALES
        const obtenerAnimal = (num) => {
            const n = num.toString().padStart(2, '0');
            const animales = {
                "00": "BALLENA", "01": "CARNERO", "02": "TORO", "03": "CIEMPIÉS", "04": "ALACRÁN",
                "05": "LEÓN", "06": "RANA", "07": "PERICO", "08": "RATÓN", "09": "ÁGUILA",
                "10": "TIGRE", "11": "GATO", "12": "CABALLO", "13": "MONO", "14": "PALOMA",
                "15": "ZORRO", "16": "OSO", "17": "PAVO", "18": "BURRO", "19": "CHIVO",
                "20": "COCHINO", "21": "GALLO", "22": "CAMELLO", "23": "CEBRA", "24": "IGUANA",
                "25": "GALLINA", "26": "VACA", "27": "PERRO", "28": "ZAMURO", "29": "ELEFANTE",
                "30": "CAIMÁN", "31": "LAPA", "32": "ARDILLA", "33": "PESCADO", "34": "VENADO",
                "35": "JIRAFA", "36": "CULEBRA", "75": "GUÁCHARO" 
                // Carlos, agrega aquí los demás según tu manual
            };
            return animales[n] || "ANIMAL " + n;
        };

        // 3. FUNCIONES DE BASE DE DATOS
        async function cargarDatos() {
            // Cargar Historial
            const { data: historial, error } = await supabase
                .from('estudio_algoritmo')
                .select('*')
                .order('fecha', { ascending: false })
                .order('hora', { ascending: false })
                .limit(20);

            if (historial) {
                const tbody = document.getElementById('cuerpoTabla');
                tbody.innerHTML = historial.map(r => `
                    <tr class="${r.numero === '75' ? 'row-especial' : ''}">
                        <td class="p-3">${r.fecha}</td>
                        <td class="p-3">${r.hora}</td>
                        <td class="p-3">${r.numero}</td>
                        <td class="p-3 font-bold text-amber-400">${r.animal}</td>
                    </tr>
                `).join('');
            }

            // Cargar Radar 75 desde la Vista
            const { data: secuencias } = await supabase.from('analisis_secuencias').select('*');
            if (secuencias) {
                const antes = [...new Set(secuencias.filter(s => s.numero === "75").map(s => s.num_antes).filter(n => n))];
                const despues = [...new Set(secuencias.filter(s => s.numero === "75").map(s => s.num_despues).filter(n => n))];
                
                document.getElementById('antes75').innerText = antes.length > 0 ? antes.join(", ") : "-";
                document.getElementById('despues75').innerText = despues.length > 0 ? despues.join(", ") : "-";
            }
        }

        // 4. EVENTO DE GUARDADO
        document.getElementById('formCaptura').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerText = "GUARDANDO...";

            const numero = document.getElementById('numero').value.padStart(2, '0');
            const fecha = document.getElementById('fecha').value;
            const hora = document.getElementById('hora').value;

            const { error } = await supabase
                .from('estudio_algoritmo')
                .insert([{ 
                    fecha, 
                    hora, 
                    numero, 
                    animal: obtenerAnimal(numero) 
                }]);

            if (error) {
                alert("Error: " + error.message);
            } else {
                e.target.reset();
                await cargarDatos();
            }
            btn.disabled = false;
            btn.innerText = "GUARDAR";
        });

        // Inicializar al cargar
        window.onload = () => {
            document.getElementById('fecha').valueAsDate = new Date();
            cargarDatos();
        };
    </script>
</body>
</html>
