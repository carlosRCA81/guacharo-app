<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANALIZADOR CRCA PRO</title>
    <style>
        :root { --bg-dark: #1a2233; --card-bg: #242f45; --accent: #3b82f6; --text: #f3f4f6; }
        body { background-color: var(--bg-dark); color: var(--text); font-family: sans-serif; margin: 0; padding: 10px; }
        #main-app { max-width: 450px; margin: auto; background: var(--card-bg); border-radius: 15px; padding: 15px; }
        
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: #60a5fa; font-size: 1.4rem; margin: 0; }
        #live-clock { color: #fbbf24; font-size: 1.2rem; font-weight: bold; margin-top: 10px; }
        
        /* PESTAÑAS ORIGINALES */
        .tab-container { display: flex; gap: 5px; margin-top: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; background: #374151; color: white; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--accent); }

        /* PANELES DE DATOS */
        .panel-info { border: 2px solid #3b82f6; border-radius: 12px; padding: 10px; text-align: center; margin-bottom: 10px; }
        .panel-next { border: 2px solid #ef4444; border-radius: 12px; padding: 15px; text-align: center; margin-bottom: 15px; }
        .badge { background: #ef4444; color: white; padding: 3px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }
        .nums-row { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .num-circle { background: #1a2233; border: 2px solid #ef4444; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; }

        /* CUADRÍCULA DE HORAS CORREGIDA */
        .grid-horas { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 15px 0; }
        .hora-item { background: #374151; padding: 12px 5px; text-align: center; border-radius: 8px; border: 1px solid #4b5563; font-size: 0.75rem; cursor: pointer; }
        .hora-item.jugado { background: #10b981; border-color: #34d399; color: #064e3b; font-weight: bold; }
        .hora-item.active { border: 2px solid #60a5fa; background: #1e3a8a; }

        .grid-animales { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; height: 250px; overflow-y: auto; margin-top: 15px; background: #1a2233; padding: 10px; border-radius: 10px; }
        .ani-btn { background: #242f45; padding: 10px 5px; text-align: center; border-radius: 6px; font-size: 0.7rem; border: 1px solid #374151; }
        
        .btn-main { width: 100%; padding: 15px; background: #3b82f6; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 1.1rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="main-app">
        <header>
            <h1>ANALIZADOR CRCA PRO</h1>
            <div style="color: #10b981; font-size: 0.7rem; margin-top: 5px;">LOTTO ACTIVO</div>
            <div id="live-clock">00:00:00</div>
            <div class="tab-container">
                <button class="tab-btn active">REGISTRO</button>
                <button class="tab-btn">ALGORITMO</button>
                <button class="tab-btn">HISTORIAL</button>
            </div>
        </header>

        <section id="content-registro">
            <div class="panel-info">
                <span style="color:#60a5fa; font-size: 0.8rem;">🎯 3 DATOS FIJOS PARA HOY</span>
                <div class="nums-row">
                    <div class="num-circle" style="border-color:#3b82f6">10</div>
                    <div class="num-circle" style="border-color:#3b82f6">37</div>
                    <div class="num-circle" style="border-color:#3b82f6">23</div>
                </div>
            </div>

            <div class="panel-next">
                <span class="badge">PRÓXIMA JUGADA CALCULADA</span>
                <div class="nums-row" id="prediccion">
                    <div class="num-circle">01</div>
                    <div class="num-circle">11</div>
                    <div class="num-circle">23</div>
                </div>
            </div>

            <div class="grid-horas" id="lista-horas"></div>

            <div style="display: flex; gap: 10px; align-items: center;">
                <div style="background:#374151; padding:15px; border-radius:10px; font-weight:bold; min-width:40px; text-align:center;">00</div>
                <button class="btn-main">ANOTAR RESULTADO</button>
            </div>

            <div class="grid-animales" id="lista-animales"></div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // CONEXIÓN ORIGINAL
        const S_URL = 'https://yhhiohwoutkmzkcengev.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InloaGlvaHdvdXRrbXprY2VuZ2V2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NDA2MDYsImV4cCI6MjA5MTQxNjYwNn0.FvoJcNPor5sicHLpRot_8DCGCd4ifx54JrxrcMrTTBc';
        const _supabase = supabase.createClient(S_URL, S_KEY);

        // HORARIO CORREGIDO: 8:00 AM A 7:00 PM
        const HORAS = ['8:00 AM', '9:00 AM', '10:00 AM', '11:00 AM', '12:00 PM', '1:00 PM', '2:00 PM', '3:00 PM', '4:00 PM', '5:00 PM', '6:00 PM', '7:00 PM'];
        
        const ANIMALES = [
            {n:'0', a:'DELFIN'}, {n:'00', a:'BALLENA'}, {n:'01', a:'CARNERO'}, {n:'02', a:'TORO'},
            {n:'03', a:'CIEMPIES'}, {n:'04', a:'ALACRAN'}, {n:'05', a:'LEON'}, {n:'06', a:'RANA'},

        ];

        let seleccion_hora = null;

        function cargarInterfaz() {
            // Reloj
            setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString(); }, 1000);

            // Render Horas
            const hCont = document.getElementById('lista-horas');
            HORAS.forEach(h => {
                const div = document.createElement('div');
                div.className = 'hora-item';
                div.innerText = h;
                div.onclick = () => {
                    document.querySelectorAll('.hora-item').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    seleccion_hora = h;
                };
                hCont.appendChild(div);
            });

            // Render Animales
            const aCont = document.getElementById('lista-animales');
            ANIMALES.forEach(ani => {
                const div = document.createElement('div');
                div.className = 'ani-btn';
                div.innerHTML = `<b>${ani.n}</b><br>${ani.a}`;
                aCont.appendChild(div);
            });
        }

        window.onload = cargarInterfaz;
    </script>
</body>
</html>
