<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRCA PRO V2 - Ordenado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="snd-alerta" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <div id="main-app">
        <header>
            <h1>CRCA PRO <span style="color: #22c55e;">V2</span></h1>
            <div id="live-clock">00:00:00</div>
            <div class="tab-container">
                <button class="tab-btn active" onclick="openTab(event, 'registro')">REGISTRO</button>
                <button class="tab-btn" onclick="openTab(event, 'tripletas-tab')">TRIPLETAS</button>
                <button class="tab-btn" onclick="openTab(event, 'estudio-avanzado')">ALGORITMO</button>
                <button class="tab-btn" onclick="openTab(event, 'historial')">HISTORIAL</button>
            </div>
        </header>

        <section id="registro" class="tab-content active">
            <div class="panel-sniper" id="panel-proxima-jugada">
                <span class="sniper-badge" id="sniper-titulo">🎯 PRÓXIMA JUGADA</span>
                <div class="sniper-nums" id="numeros-sugeridos-directos">...</div>
                <div id="aviso-fuera" style="color: #ff4d4d; font-size: 0.75rem; margin-top: 5px; font-weight: bold;"></div>
            </div>

            <div class="panel-diario" id="panel-diario-sorteos"></div>

            <div class="entrada-rapida">
                <input type="text" id="num-rapido" maxlength="2" placeholder="00">
                <button onclick="registrarPorNumero()">ANOTAR</button>
            </div>
            
            <div class="grid-animales" id="grid-container"></div>
            <input type="date" id="fecha-analisis" class="fecha-input">
        </section>

        <section id="tripletas-tab" class="tab-content">
            <h2 style="text-align:center; color: #fbbf24; font-size: 1rem;">🔥 TRIPLETAS DEL DÍA</h2>
            <div id="seccion-tripletas" class="tripleta-list"></div>
        </section>

        <section id="estudio-avanzado" class="tab-content">
            <div class="radar-container">
                <h3>📡 RADAR DE ATRACCIÓN</h3>
                <select id="select-estudio-animal" onchange="estudiarAtraccion()"></select>
                <div id="resultado-atraccion"></div>
            </div>
        </section>

        <section id="historial" class="tab-content">
            <input type="date" id="fecha-busqueda-historial" onchange="actualizarTabla()" class="fecha-input">
            <div class="tabla-contenedor">
                <table>
                    <thead><tr><th>Hora</th><th>Nro</th><th>Animal</th><th>Sec/Elt</th><th>Color</th></tr></thead>
                    <tbody id="lista-historial"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="logic.js"></script>
</body>
</html>
