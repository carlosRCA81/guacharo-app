<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador CRCA - Pro</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .panel-diario { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 15px; background: #0f172a; padding: 10px; border-radius: 8px; }
        .hora-box { background: #334155; padding: 8px; text-align: center; border-radius: 4px; border: 1px solid #475569; color: #f8fafc; cursor: pointer; font-size: 0.65rem;}
        .hora-box.jugado { background: #22c55e !important; color: #0f172a; font-weight: bold;}
        .hora-box.active-select { border: 2px solid #38bdf8 !important; background: #1e293b; }
        .badge { padding: 3px 6px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; margin-right: 4px; display: inline-block; margin-top: 5px;}
        .espejito { background: #a855f7; color: white; }
        .escalera { background: #3b82f6; color: white; }
        .row-guacharo { background: rgba(251, 191, 36, 0.2) !important; color: #fbbf24; }
        .animal-btn { background:#334155; padding:5px; text-align:center; border-radius:4px; cursor:pointer; font-size:0.65rem; color:white; border: 1px solid #475569;}
    </style>
</head>
<body>
    <div id="main-app">
        <header>
            <h1>ANALIZADOR CRCA</h1>
            <div id="live-clock">00:00:00</div>
            <div class="tab-container">
                <button class="tab-btn active" onclick="openTab(event, 'registro')">REGISTRO</button>
                <button class="tab-btn" onclick="openTab(event, 'estudio')">INTELIGENCIA</button>
                <button class="tab-btn" onclick="openTab(event, 'historial')">SEMANA</button>
            </div>
        </header>

        <section id="registro" class="tab-content active">
            <div class="panel-diario" id="panel-diario-sorteos"></div>
            
            <div id="alerta-probabilidad" style="background: #1e293b; padding: 12px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #38bdf8; min-height: 50px;">
                <p style="color: #64748b; font-size: 0.75rem; margin: 0;">Seleccione una hora para iniciar el estudio inteligente...</p>
            </div>

            <div class="controls-row" style="margin-bottom:10px;">
                <input type="date" id="fecha-analisis" style="width: 100%; padding: 8px; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 5px;">
            </div>

            <div class="entrada-rapida-container" style="display:flex; gap:10px; margin-bottom:15px;">
                <input type="text" id="num-rapido" maxlength="2" placeholder="Nro" style="width:70px; text-align:center; font-weight:bold; font-size:1.2rem; background:#0f172a; color:#fbbf24; border:1px solid #38bdf8;">
                <button onclick="registrarPorNumero()" style="flex-grow:1; background:#38bdf8; color:#0f172a; font-weight:bold;">ANOTAR</button>
            </div>
            <div class="grid-animales" id="grid-container" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:5px;"></div>
        </section>

        <section id="estudio" class="tab-content" style="display:none;">
            <h3>ESTADO GUACHARO</h3>
            <div class="card-stats" style="text-align:center; padding:20px; background:#0f172a; border-radius:10px; border:1px solid #fbbf24; margin-bottom:20px;">
                <p style="color:#fbbf24; margin:0; font-size:0.8rem;">DÍAS DE AUSENCIA</p>
                <div id="dias-sin-75" style="font-size:4rem; font-weight:bold; color:white;">0</div>
            </div>
            <p style="font-size:0.7rem; color:#64748b; text-align:center;">El panel inteligente en la pestaña REGISTRO analiza las secuencias automáticamente.</p>
        </section>

        <section id="historial" class="tab-content" style="display:none;">
            <h3 style="color:#38bdf8; font-size:0.9rem;">HISTORIAL DE ESTA SEMANA</h3>
            <div class="tabla-contenedor" style="max-height: 500px; overflow-y: auto;">
                <table style="width:100%; border-collapse: collapse; font-size: 0.75rem;">
                    <thead>
                        <tr style="background:#1e293b; color:#38bdf8;">
                            <th>Fecha</th><th>Hora</th><th>Nro</th><th>Animal</th>
                        </tr>
                    </thead>
                    <tbody id="lista-historial" style="text-align:center;"></tbody>
                </table>
            </div>
            <button onclick="cargarHistorialRemoto()" style="margin-top:15px; background:#334155; width:100%; padding:10px;">RECARGAR NUBE</button>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="logic.js"></script>
</body>
</html>
