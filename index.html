<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRCA Intelligence Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="header-pro">
            <h2>CRCA INTELLIGENCE v4</h2>
            <div id="live-clock" class="clock-digital">00:00:00</div>
        </header>

        <section class="intel-card">
            <h3 style="color: var(--accent-gold); margin-top: 0; font-size: 0.9rem;">🎯 PREDICCIÓN DE ALGORITMO</h3>
            <div class="prediction-grid">
                <div class="fixed-play"><small>FIJA 1</small><span id="p1">--</span></div>
                <div class="fixed-play"><small>FIJA 2</small><span id="p2">--</span></div>
                <div class="fixed-play"><small>FIJA 3</small><span id="p3">--</span></div>
            </div>
            <div id="guacharo-intel" style="margin-top: 15px; font-size: 0.75rem; color: #94a3b8; border-top: 1px solid #334155; padding-top: 10px;">
                Cargando radar del Guácharo (75)...
            </div>
        </section>

        <section class="intel-card">
            <div style="display: flex; gap: 8px;">
                <input type="date" id="fecha">
                <select id="hora">
                    <option>9:00 AM</option><option>10:00 AM</option><option>11:00 AM</option>
                    <option>12:00 PM</option><option>1:00 PM</option><option>4:00 PM</option>
                    <option>5:00 PM</option><option>7:00 PM</option>
                </select>
            </div>
            <input type="number" id="num" placeholder="Número Ganador (00-75)" pattern="\d*">
            <button class="btn-save" onclick="guardarDato()">SINCRONIZAR RESULTADO</button>
            <div id="status-msg" style="text-align: center; font-size: 0.7rem; color: var(--accent-glow);"></div>
        </section>

        <section class="intel-card">
            <h3 style="font-size: 0.85rem; margin-top: 0;">📊 ÚLTIMOS SORTEOS</h3>
            <table class="compact-table">
                <thead>
                    <tr><th>Hora</th><th>Nro</th><th>Animal</th><th>Fecha</th></tr>
                </thead>
                <tbody id="lista-historial">
                    </tbody>
            </table>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="logic.js"></script>
    
    <script src="security.js"></script>
</body>
</html>
