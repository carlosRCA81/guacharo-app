<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador CRCA - Pro</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .panel-diario { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 15px; background: #0f172a; padding: 10px; border-radius: 8px; font-size: 0.7rem;}
        .hora-box { background: #334155; padding: 8px; text-align: center; border-radius: 4px; border: 1px solid #475569; color: #f8fafc; cursor: pointer; transition: 0.3s;}
        .hora-box.jugado { background: #22c55e !important; color: #0f172a; font-weight: bold; border: 2px solid #fff;}
        .hora-box.active-select { border: 2px solid #38bdf8; background: #1e293b; }
        .entrada-rapida-container { background: #0f172a; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #38bdf8; display: flex; gap: 10px; align-items: center;}
        #num-rapido { background: #1e293b; color: #fbbf24; border: none; padding: 8px; border-radius: 4px; font-size: 1rem; font-weight: bold; width: 60px; text-align: center;}
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; margin-right: 5px; display: inline-block; margin-top: 5px;}
        .espejito { background: #a855f7; color: white; }
        .escalera { background: #3b82f6; color: white; }
        .seguidilla { background: #ec4899; color: white; }
        #alerta-probabilidad { background: #1e293b; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #fbbf24; min-height: 40px; }
    </style>
</head>
<body>
    <div id="main-app">
        <header>
            <h1>ANALIZADOR CRCA</h1>
            <div id="live-clock">Cargando...</div>
            <div class="tab-container">
                <button class="tab-btn active" onclick="openTab(event, 'registro')">REGISTRO</button>
                <button class="tab-btn" onclick="openTab(event, 'estudio')">ESTUDIO 75</button>
                <button class="tab-btn" onclick="openTab(event, 'historial')">HISTORIAL</button>
            </div>
        </header>

        <section id="registro" class="tab-content active">
            <div class="panel-diario" id="panel-diario-sorteos"></div>
            <div class="controls-row">
                <input type="date" id="fecha-analisis">
            </div>
            
            <div id="alerta-probabilidad"></div>

            <div class="entrada-rapida-container">
                <input type="text" id="num-rapido" maxlength="2" placeholder="00">
                <button onclick="registrarPorNumero()" style="width: auto; padding: 10px 20px;">ANOTAR</button>
            </div>
            <div class="grid-animales" id="grid-container" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:5px;"></div>
        </section>

        <section id="estudio" class="tab-content" style="display:none;">
            <h3>INTELIGENCIA GUACHARO</h3>
            <div class="card-stats">
                <p style="color:#fbbf24;">DÍAS AUSENTE</p>
                <div style="font-size:3rem; color:#fff;" id="dias-sin-75">0</div>
            </div>
        </section>

        <section id="historial" class="tab-content" style="display:none;">
            <h3>DATOS ACUMULADOS</h3>
            <div style="background: #0f172a; padding: 10px; border-radius: 8px; margin-bottom: 10px;">
                <input type="date" id="fecha-busqueda-historial" style="margin-bottom:10px;">
                <button onclick="buscarHistorialPorFecha()">FILTRAR DÍA</button>
            </div>

            <div class="tabla-contenedor">
                <table>
                    <thead>
                        <tr><th>Fecha</th><th>Hora</th><th>Nro</th><th>Animal</th><th>Tipo</th></tr>
                    </thead>
                    <tbody id="lista-historial"></tbody>
                </table>
            </div>
            <button onclick="cargarHistorialRemoto()" style="margin-top:10px; background:#475569;">REFRESCAR TODO</button>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="logic.js"></script>
</body>
</html>
